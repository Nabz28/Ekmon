const WEEKS={
week1:{
title:"Week 1 \u2014 Why Study Money, Banking & Financial Markets",
subtitle:"Mishkin Ch. 1 \u00b7 The Economics of Money, Banking, and Financial Markets (12th Global Ed.)",
sections:[
{head:"Why Study Financial Markets?",num:"1",cards:[
{title:"Financial Markets: The Essential Function",content:"<p>Financial markets channel funds from <b>lender-savers</b> (those with surplus) to <b>borrower-spenders</b> (those with shortage). This promotes <b>economic efficiency</b> by producing an efficient allocation of capital and improves consumer well-being by allowing better timing of purchases.</p><div class=\"wk-highlight\">\ud83d\udca1 Without financial markets, it would be extremely difficult for entrepreneurs to start businesses or for consumers to buy houses. Financial markets are the backbone of economic growth.</div>"},
{title:"The Bond Market and Interest Rates",content:"<p>A <span class=\"wk-key\">security</span> (financial instrument) is a claim on the issuer\u2019s future income or assets. A <span class=\"wk-key\">bond</span> is a debt security that promises periodic payments for a specified period. An <span class=\"wk-key\">interest rate</span> is the cost of borrowing \u2014 the price paid for the rental of funds.</p><ul><li>Interest rates on different bonds move together but with <b>risk spreads</b></li><li>Corporate Baa bonds yield MORE than government bonds (default risk premium)</li><li>Rates peaked at ~20% in early 1980s (Volcker), near zero after 2008 crisis</li></ul><div class=\"wk-exam\">\ud83d\udcdd Interest rates affect: personal decisions (save or spend?), business decisions (invest or not?), and the overall economy (expansion or recession?). They are the MOST IMPORTANT financial variable.</div>"},
{title:"The Stock Market",content:"<p><span class=\"wk-key\">Common stock</span> = share of ownership in a corporation = claim on residual earnings and assets after debts are paid.</p><ul><li>Stock prices are highly <b>volatile</b> \u2014 DJIA went from ~1,000 (1980) to 20,000+ (2017) with major crashes (1987, 2000-02, 2008-09)</li><li>Affect people\u2019s <b>wealth</b> and firms\u2019 ability to raise capital for investment</li><li>Stock price declines reduce wealth \u2192 lower consumer spending \u2192 economic contraction</li></ul>"},
]},
{head:"Financial Institutions & Banking",num:"2",cards:[
{title:"Financial Intermediaries",content:"<p><span class=\"wk-key\">Financial intermediaries</span>: institutions that borrow funds from savers and lend to those who need funds.</p><ul><li><b>Banks:</b> accept deposits and make loans \u2014 the most important intermediaries</li><li><b>Other institutions:</b> insurance companies, finance companies, pension funds, mutual funds, investment companies</li></ul><p><span class=\"wk-key\">Financial innovation</span> = development of new financial products and services. Can be a force for good (efficiency) but also create new risks (2008 crisis).</p><p><span class=\"wk-key\">E-finance</span> = electronic delivery of financial services. Transforming how banking works.</p>"},
{title:"Financial Crises",content:"<p><span class=\"wk-key\">Financial crises</span> = major disruptions in financial markets characterized by sharp declines in asset prices and failures of many financial and nonfinancial firms.</p><div class=\"wk-highlight\">\ud83d\udca1 The 2007-2009 financial crisis was the worst since the Great Depression. It began with problems in the US mortgage market and cascaded globally, showing how interconnected the financial system has become.</div>"},
]},
{head:"Money, Monetary Policy & the Economy",num:"3",cards:[
{title:"Money and Business Cycles",content:"<p><span class=\"wk-key\">Money</span> = anything generally accepted as payment for goods or services or in repayment of debts.</p><p>Evidence: money plays an important role in generating <b>business cycles</b> (upward/downward movements of aggregate output). Every U.S. recession preceded by a decline in money supply growth rate.</p><p><span class=\"wk-key\">Monetary theory</span> ties changes in money supply to changes in aggregate economic activity and the price level.</p>"},
{title:"Money and Inflation",content:"<p>The <span class=\"wk-key\">aggregate price level</span> is the average price of goods and services. <span class=\"wk-key\">Inflation</span> = a continual rise in the price level.</p><div class=\"wk-formula\">Cross-country evidence (2006-2016):\nRussia: 17% money growth \u2192 ~9% inflation\nTurkey: 16% money growth \u2192 ~8% inflation\nIndonesia: 14% money growth \u2192 ~5.5% inflation\nJapan: 3% money growth \u2192 ~0.3% inflation\nEuro area: 4% money growth \u2192 ~1.5% inflation\n\n\u2192 Countries with higher money growth have higher inflation</div><div class=\"wk-exam\">\ud83d\udcdd This cross-country evidence is one of the strongest empirical regularities in economics and supports the Quantity Theory of Money: MV = PY.</div>"},
{title:"Money and Interest Rates",content:"<p>Interest rates are the <b>price of money</b>. The rate of money growth is an important determinant of interest rates.</p><ul><li>Prior to 1980: money growth and long-term Treasury bond rates were closely tied</li><li>Since then: relationship is less clear, but money growth remains an important determinant</li></ul>"},
{title:"Fiscal Policy vs Monetary Policy",content:"<table class=\"wk-table\"><tr><th></th><th>Monetary Policy</th><th>Fiscal Policy</th></tr><tr><td><b>Definition</b></td><td>Management of money supply and interest rates</td><td>Government spending and taxation</td></tr><tr><td><b>Conducted by</b></td><td>Central bank (Fed, BI)</td><td>Government (Congress/Parliament)</td></tr><tr><td><b>Key variables</b></td><td>Interest rate (i), Money supply (M)</td><td>Government spending (G), Taxes (T)</td></tr><tr><td><b>Deficit</b></td><td>\u2014</td><td>G > T \u2192 must borrow (issue bonds)</td></tr><tr><td><b>Surplus</b></td><td>\u2014</td><td>T > G</td></tr></table>"},
]},
{head:"International Finance & Exchange Rates",num:"4",cards:[
{title:"The Foreign Exchange Market",content:"<p>The <span class=\"wk-key\">foreign exchange market</span> converts currencies. The <span class=\"wk-key\">exchange rate</span> is the price of one currency in terms of another.</p><p>Financial markets have become increasingly <b>integrated globally</b>. Key policy questions:</p><ul><li>How does exchange rate policy affect monetary policy?</li><li>How do capital controls impact domestic financial systems?</li><li>What should be the role of international financial institutions (IMF)?</li></ul>"},
{title:"Appendix: Measuring the Economy",content:"<p><span class=\"wk-key\">GDP</span> = market value of all final goods and services produced in a country during a year.</p><p><b>Aggregate income</b> (total factor payments) = <b>Aggregate output</b> (GDP). They are identical by definition.</p><div class=\"wk-formula\">Nominal GDP: current prices (affected by inflation)\nReal GDP: constant base-year prices (strips out inflation)\n\nGDP Deflator = (Nominal GDP / Real GDP) \u00d7 100\n\nThree price measures:\n1. GDP Deflator (broadest \u2014 all goods produced)\n2. PCE Deflator (Fed\u2019s preferred \u2014 personal consumption)\n3. CPI (most reported \u2014 fixed consumer basket)\n\nInflation rate \u03c0 = (P\u209c \u2212 P\u209c\u208b\u2081) / P\u209c\u208b\u2081 \u00d7 100</div>"},
]},
]},
week2:{
title:"Week 2 \u2014 An Overview of the Financial System",
subtitle:"Mishkin Ch. 2 \u00b7 Direct vs Indirect Finance, Financial Instruments, Intermediaries & Regulation",
sections:[
{head:"Function & Structure of Financial Markets",num:"1",cards:[
{title:"Channeling Funds: Direct vs Indirect",content:"<p>The financial system\u2019s essential function: channel funds from <b>lender-savers</b> (households, firms, govt, foreigners with surplus) to <b>borrower-spenders</b> (firms, govt, households, foreigners with shortage).</p><ul><li><span class=\"wk-key\">Direct finance:</span> borrowers borrow directly from lenders by selling them securities (stocks, bonds)</li><li><span class=\"wk-key\">Indirect finance:</span> financial intermediaries (banks) borrow from savers and lend to borrowers \u2014 accounts for FAR MORE total funding</li></ul><div class=\"wk-highlight\">\ud83d\udca1 Why does indirect finance dominate? Because intermediaries solve three problems that individuals cannot solve efficiently: (1) high transaction costs, (2) risk concentration, and (3) information asymmetry.</div>"},
{title:"Structure of Financial Markets",content:"<p><b>Debt vs Equity Markets:</b></p><ul><li><span class=\"wk-key\">Debt instruments:</span> contractual agreement to pay fixed amounts. Has a <b>maturity</b> (expiration date). Short-term (<1yr), intermediate (1-10yr), long-term (>10yr).</li><li><span class=\"wk-key\">Equities:</span> claims to share in net income and assets. <b>Dividends</b> = periodic payments. Stockholder is <b>residual claimant</b> (paid last).</li></ul><p><b>Primary vs Secondary:</b></p><ul><li><span class=\"wk-key\">Primary market:</span> NEW securities issued. <b>Investment banks</b> underwrite (guarantee a price to the issuer). Not well known to public.</li><li><span class=\"wk-key\">Secondary market:</span> PREVIOUSLY ISSUED securities traded. <b>Brokers</b> (match buyers/sellers) and <b>dealers</b> (buy/sell from own inventory) operate here.</li></ul><p><b>Exchanges vs OTC:</b> NYSE = exchange (centralized). Forex, fed funds = OTC (decentralized).</p><p><b>Money vs Capital Markets:</b></p><table class=\"wk-table\"><tr><th></th><th>Money Market</th><th>Capital Market</th></tr><tr><td>Maturity</td><td>< 1 year</td><td>> 1 year</td></tr><tr><td>Risk</td><td>Low</td><td>Higher</td></tr><tr><td>Liquidity</td><td>High</td><td>Lower</td></tr><tr><td>Examples</td><td>T-bills, CDs, commercial paper, repos</td><td>Stocks, bonds, mortgages</td></tr></table>"},
]},
{head:"Financial Market Instruments",num:"2",cards:[
{title:"Money Market Instruments",content:"<table class=\"wk-table\"><tr><th>Instrument</th><th>Key Features</th><th>2016 ($B)</th></tr><tr><td><b>U.S. Treasury bills</b></td><td>Most liquid. Sold at discount, no coupons. Zero default risk.</td><td>1,816</td></tr><tr><td><b>Negotiable CDs</b></td><td>Bank certificates, large denominations (>$100K), tradeable in secondary market.</td><td>1,727</td></tr><tr><td><b>Commercial paper</b></td><td>Short-term unsecured corporate IOUs. Only issued by large, creditworthy firms.</td><td>885</td></tr><tr><td><b>Fed funds & Repos</b></td><td>Overnight interbank lending. Repos use T-bills as <b>collateral</b> (asset received if default).</td><td>3,778</td></tr></table><div class=\"wk-exam\">\ud83d\udcdd The federal funds rate \u2014 the rate banks charge each other for overnight loans of reserves \u2014 is the key monetary policy rate targeted by the Fed.</div>"},
{title:"Capital Market Instruments",content:"<table class=\"wk-table\"><tr><th>Instrument</th><th>2016 ($B)</th><th>Notes</th></tr><tr><td><b>Corporate stocks</b></td><td>38,685</td><td>Largest by market value</td></tr><tr><td><b>U.S. govt securities</b></td><td>12,064</td><td>Marketable long-term</td></tr><tr><td><b>Corporate bonds</b></td><td>12,008</td><td>Fixed coupon payments</td></tr><tr><td><b>Residential mortgages</b></td><td>10,283</td><td>Largest debt instrument</td></tr><tr><td><b>U.S. agency securities</b></td><td>8,531</td><td>Fannie Mae, Freddie Mac</td></tr><tr><td><b>Consumer loans</b></td><td>3,765</td><td>Auto, student, credit card</td></tr><tr><td><b>Bank commercial loans</b></td><td>3,360</td><td>Business lending</td></tr><tr><td><b>State/local govt bonds</b></td><td>3,030</td><td>Municipal bonds (munis)</td></tr></table>"},
{title:"International Instruments",content:"<ul><li><span class=\"wk-key\">Foreign bonds:</span> sold in a foreign country, denominated in THAT country\u2019s currency (e.g., a US firm issues bonds in London denominated in \u00a3)</li><li><span class=\"wk-key\">Eurobonds:</span> denominated in a currency OTHER than the country where sold (e.g., a bond denominated in USD sold in London)</li><li><span class=\"wk-key\">Eurocurrencies:</span> foreign currencies deposited in banks outside the home country</li><li><span class=\"wk-key\">Eurodollars:</span> U.S. dollars deposited in foreign banks outside the US \u2014 important source of funds for international banking</li></ul>"},
]},
{head:"Function of Financial Intermediaries",num:"3",cards:[
{title:"Three Reasons Intermediaries Exist",content:"<p><b>1. Lower Transaction Costs</b></p><ul><li><b>Economies of scale:</b> bundling many small transactions \u2192 lower per-unit cost</li><li><b>Liquidity services:</b> provide liquid assets (deposits) backed by illiquid ones (loans)</li></ul><p><b>2. Risk Sharing</b></p><ul><li><b>Asset transformation:</b> convert risky assets into safer ones for depositors</li><li><b>Diversification:</b> spread risk across many borrowers \u2014 \u201cdon\u2019t put all eggs in one basket\u201d</li></ul><p><b>3. Deal with Asymmetric Information</b></p><ul><li><span class=\"wk-key\">Adverse selection</span> (BEFORE the transaction): avoid selecting risky borrowers by gathering information about them. The <b>lemons problem</b> \u2014 bad risks crowd out good risks.</li><li><span class=\"wk-key\">Moral hazard</span> (AFTER the transaction): ensure borrower will not engage in activities that prevent loan repayment. Solution: <b>restrictive covenants</b> in the contract.</li></ul><div class=\"wk-highlight\">\ud83d\udca1 <b>Key conclusion:</b> Financial intermediaries allow \u201csmall\u201d savers and borrowers to benefit from financial markets. Without them, only large institutions could participate efficiently.</div>"},
{title:"Types of Financial Intermediaries",content:"<table class=\"wk-table\"><tr><th>Category</th><th>Type</th><th>Source of Funds</th><th>Use of Funds</th></tr><tr><td rowspan=\"3\"><b>Depository</b></td><td>Commercial banks</td><td>Deposits</td><td>Business/consumer loans, mortgages, govt securities</td></tr><tr><td>Savings & Loans</td><td>Deposits</td><td>Mortgages</td></tr><tr><td>Credit unions</td><td>Deposits</td><td>Consumer loans</td></tr><tr><td rowspan=\"3\"><b>Contractual Savings</b></td><td>Life insurance</td><td>Premiums</td><td>Corporate bonds, mortgages</td></tr><tr><td>Fire/casualty insurance</td><td>Premiums</td><td>Municipal bonds, corp bonds, stocks</td></tr><tr><td>Pension funds</td><td>Employer/employee contributions</td><td>Corporate bonds and stocks</td></tr><tr><td rowspan=\"4\"><b>Investment</b></td><td>Finance companies</td><td>Commercial paper, stocks, bonds</td><td>Consumer/business loans</td></tr><tr><td>Mutual funds</td><td>Shares</td><td>Stocks, bonds</td></tr><tr><td>Money market mutual funds</td><td>Shares</td><td>Money market instruments</td></tr><tr><td>Hedge funds</td><td>Partnership participation</td><td>Diverse: stocks, bonds, currencies, etc.</td></tr></table>"},
]},
{head:"Regulation of the Financial System",num:"4",cards:[
{title:"Why Regulate?",content:"<p><b>1. Increase information available to investors:</b></p><ul><li>Reduce adverse selection and moral hazard problems</li><li>Restrict insider trading (SEC enforcement)</li></ul><p><b>2. Ensure soundness of financial intermediaries:</b></p><ul><li><b>Restrictions on entry</b> (chartering process)</li><li><b>Disclosure of information</b> (mandatory financial reporting)</li><li><b>Restrictions on assets and activities</b> (control risky holdings)</li><li><b>Deposit Insurance</b> (FDIC \u2014 $250,000 per depositor per bank) to prevent bank runs</li><li><b>Limits on competition</b> (mostly historical: branching restrictions, interest rate caps)</li></ul>"},
{title:"Principal U.S. Regulatory Agencies",content:"<table class=\"wk-table\"><tr><th>Agency</th><th>Regulates</th><th>Nature of Regulation</th></tr><tr><td><b>SEC</b></td><td>Exchanges, financial markets</td><td>Requires disclosure; restricts insider trading</td></tr><tr><td><b>CFTC</b></td><td>Futures exchanges</td><td>Regulates trading procedures</td></tr><tr><td><b>OCC</b></td><td>Federally-chartered banks</td><td>Charters, examines, restricts assets</td></tr><tr><td><b>NCUA</b></td><td>Federal credit unions</td><td>Charters, examines credit unions</td></tr><tr><td><b>FDIC</b></td><td>Banks, S&Ls</td><td>Deposit insurance ($250K), examines insured banks</td></tr><tr><td><b>Federal Reserve</b></td><td>All depository institutions</td><td>Examines banks, sets reserve requirements, systemic oversight</td></tr><tr><td><b>State commissions</b></td><td>State-chartered banks, insurance</td><td>Charter, examine, restrict branching</td></tr></table>"},
]},
]},
week3:{
title:"Week 3 \u2014 What Is Money?",
subtitle:"Mishkin Ch. 3 \u00b7 Definition, Functions, Payment Systems, M1 & M2 Aggregates",
sections:[
{head:"Meaning of Money",num:"1",cards:[
{title:"What Is Money?",content:"<p><span class=\"wk-key\">Money</span> (or the \u201cmoney supply\u201d): anything that is generally accepted as payment for goods or services or in the repayment of debts.</p><div class=\"wk-highlight\">\ud83d\udca1 <b>Critical distinctions \u2014 know these cold:</b><br>\u2022 <b>Money \u2260 Wealth:</b> Wealth = total collection of property that stores value (stocks, real estate, etc.). Money is a SUBSET of wealth.<br>\u2022 <b>Money \u2260 Income:</b> Income = flow of earnings per unit of time (salary per month). Money is a STOCK (exists at a point in time).<br>\u2022 <b>Example:</b> A person can have high income but low money (everything invested in stocks). Or high wealth but low money (owns real estate).</div>"},
]},
{head:"Three Functions of Money",num:"2",cards:[
{title:"1. Medium of Exchange (Most Important)",content:"<p>Money eliminates the trouble of finding a <span class=\"wk-key\">double coincidence of wants</span> \u2014 the improbable situation where each party to a transaction has exactly what the other wants.</p><p><b>A good medium of exchange must be:</b></p><ul><li>\u2705 <b>Easily standardized</b> \u2014 uniform quality makes valuation instant</li><li>\u2705 <b>Widely accepted</b> \u2014 network effect: the more people accept it, the better it works</li><li>\u2705 <b>Divisible</b> \u2014 must handle transactions of all sizes</li><li>\u2705 <b>Easy to carry</b> \u2014 portable for daily transactions</li><li>\u2705 <b>Not deteriorate quickly</b> \u2014 durable over time</li></ul><div class=\"wk-formula\">Without money: N goods \u2192 N(N-1)/2 exchange rates needed\nWith money: N goods \u2192 only N-1 prices needed\n\nExample: 1,000 goods\nBarter: 1,000 \u00d7 999 / 2 = 499,500 exchange rates!\nMoney: only 999 prices\n\n\u2192 Money DRAMATICALLY reduces transaction costs\n\u2192 Enables specialization and division of labor</div>"},
{title:"2. Unit of Account",content:"<p>Money provides a <b>common measure</b> for stating prices and recording debts. Reduces the cost of comparing values across goods.</p><div class=\"wk-exam\">\ud83d\udcdd The UoA function breaks down during <b>hyperinflation</b>. When prices change hourly, money no longer serves as a reliable measuring stick. Countries often switch to a foreign currency (e.g., USD) as their UoA while keeping local currency for transactions. This shows that the MoE and UoA functions are conceptually separable.</div>"},
{title:"3. Store of Value",content:"<p>Money can save <b>purchasing power</b> over time. Other assets also store value (stocks, real estate, gold), but money is the <b>most liquid</b> of all assets.</p><p><b>The tradeoff:</b> Money is perfectly liquid but earns no return (currency) or low return (deposits), AND it loses value during inflation. This tradeoff is central to understanding money demand.</p><div class=\"wk-formula\">Opportunity cost of holding money = interest rate (i)\n\n\u2022 Higher i \u2192 hold LESS money, buy more bonds\n  (money is more \"expensive\" to hold)\n\u2022 Higher inflation \u2192 money is a WORSE store of value\n  (purchasing power erodes faster)\n\u2022 Hyperinflation \u2192 people flee money entirely\n  (dollarization, gold hoarding, barter)</div>"},
]},
{head:"Evolution of the Payments System",num:"3",cards:[
{title:"Five Stages of Payment Evolution",content:"<ol><li><span class=\"wk-key\">Commodity money:</span> Valuable, standardized, divisible commodities (precious metals, cigarettes in POW camps). <b>Problem:</b> heavy and hard to transport.</li><li><span class=\"wk-key\">Fiat money:</span> Paper money decreed by government as <b>legal tender</b>. Not backed by any physical commodity. Value depends on supply and demand + government decree.</li><li><span class=\"wk-key\">Checks:</span> Instructions to your bank to transfer money from your account. <b>Advantage:</b> exact amounts, safer than carrying cash. <b>Problem:</b> slow processing time.</li><li><span class=\"wk-key\">Electronic payment:</span> Online bill pay, direct deposit, wire transfers. Faster and cheaper than paper checks.</li><li><span class=\"wk-key\">E-money:</span> (a) <b>Debit cards</b> \u2014 directly access deposit account (b) <b>Stored-value cards</b> (smart cards) \u2014 prepaid (c) <b>E-cash</b> \u2014 digital tokens</li></ol>"},
{title:"Will Bitcoin Become the Money of the Future?",content:"<p>Bitcoin (created 2009): decentralized digital currency \u201cmined\u201d by users who verify transactions using computing power.</p><table class=\"wk-table\"><tr><th>Function</th><th>Assessment</th><th>Why</th></tr><tr><td>Medium of Exchange</td><td>\u2705 Partial</td><td>Some merchants accept, but limited adoption and slow processing</td></tr><tr><td>Unit of Account</td><td>\u274c Fails</td><td>Too volatile \u2014 virtually no goods priced in BTC</td></tr><tr><td>Store of Value</td><td>\u274c Fails</td><td>Price swings of 50%+ in months</td></tr></table><p><b>Conclusion:</b> Unlikely to replace fiat money. But blockchain technology may transform payment infrastructure.</p><div class=\"wk-exam\">\ud83d\udcdd Despite decades of predictions, we are NOT heading to a cashless society. Cash persists because of: privacy concerns, simplicity for small purchases, backup during system failures, and network inertia. However, e-money usage will continue to increase.</div>"},
]},
{head:"Measuring Money: M1 and M2",num:"4",cards:[
{title:"The Federal Reserve\u2019s Monetary Aggregates",content:"<div class=\"wk-formula\">M1 (most liquid) = Currency               $1,481.5B\n                 + Traveler\u2019s checks       $    2.0B\n                 + Demand deposits        $1,501.5B\n                 + Other checkable dep.   $  574.8B\n                 = Total M1               $3,559.8B\n\nM2 (adds near-money) = M1                $3,559.8B\n                     + Small time dep.   $  357.7B\n                     + Savings & MMDA    $8,923.9B  \u2190 LARGEST\n                     + Retail MMMF       $  673.7B\n                     = Total M2          $13,515.1B\n\n(Data as of July 3, 2017)</div><p><b>Key observation:</b> Savings deposits and money market deposit accounts ($8.9T) dwarf all other M2 components. This is where most of America\u2019s liquid wealth sits.</p>"},
{title:"M1 vs M2: Does It Matter?",content:"<p><b>YES</b> \u2014 M1 and M2 can move in <b>different directions</b> in the short run:</p><ul><li>When rates FALL \u2192 savings become less attractive \u2192 people shift to checking \u2192 M1\u2191, M2 unchanged</li><li>When rates RISE \u2192 savings more attractive \u2192 people shift from checking to savings \u2192 M1\u2193, M2 unchanged</li><li>Financial innovation (sweep accounts) automatically moves funds between components overnight</li></ul><p><b>Policy implication:</b> Using the wrong aggregate gives wrong policy signals. This is why the Fed now targets the interest rate rather than monetary aggregates.</p><div class=\"wk-highlight\">\ud83d\udca1 <b>Where are all the U.S. dollars?</b> Over $4,500 of currency per person \u2014 far more than most carry. Answer: <b>criminals</b> (anonymity for illegal transactions) and <b>foreigners</b> (USD as global store of value). Over half of U.S. currency is held <b>outside the United States</b>.</div>"},
]},
]},
week4:{
title:"Week 4 \u2014 The Meaning of Interest Rates",
subtitle:"Mishkin Ch. 4 \u00b7 Present Value, Yield to Maturity, Rate of Return, Real vs Nominal Rates",
sections:[
{head:"Present Value & Discounting",num:"1",cards:[
{title:"The Concept of Present Value",content:"<p><span class=\"wk-key\">Present value</span> is the foundational concept: a dollar paid to you one year from now is <b>less valuable</b> than a dollar paid today. Why? Because a dollar deposited today can earn interest and become $1\u00d7(1+i) one year from today.</p><div class=\"wk-formula\">Simple Present Value:\nPV = CF / (1 + i)\u207f\n\nPV = today\u2019s (present) value\nCF = future cash flow (payment)\ni = the interest rate\nn = number of years\n\nExample (i = 10%):\nYear 1: $100 \u00d7 (1.10) = $110\nYear 2: $100 \u00d7 (1.10)\u00b2 = $121\nYear 3: $100 \u00d7 (1.10)\u00b3 = $133.10\nYear n: $100 \u00d7 (1 + i)\u207f</div><div class=\"wk-highlight\">\ud83d\udca1 You CANNOT directly compare payments scheduled at different points in time. You must discount them all to the same point (usually today) before comparing. This is why lotteries offering \"$20 million\" paid as $1M/year for 20 years are worth far less than $20M today.</div>"},
{title:"Four Types of Credit Market Instruments",content:"<p>All debt instruments fall into one of four categories:</p><table class=\"wk-table\"><tr><th>Instrument</th><th>Description</th><th>Example</th></tr><tr><td><span class=\"wk-key\">Simple Loan</span></td><td>Lender provides funds, borrower repays principal + interest at maturity</td><td>Commercial loans to businesses</td></tr><tr><td><span class=\"wk-key\">Fixed-Payment Loan</span></td><td>Same cash flow payment every period over the life of the loan</td><td>Mortgages, car loans</td></tr><tr><td><span class=\"wk-key\">Coupon Bond</span></td><td>Periodic coupon payments + face value at maturity</td><td>Treasury bonds, corporate bonds</td></tr><tr><td><span class=\"wk-key\">Discount Bond</span></td><td>Bought at price below face value, repays face value at maturity. No coupon.</td><td>Treasury bills</td></tr></table>"},
]},
{head:"Yield to Maturity (YTM)",num:"2",cards:[
{title:"Definition & Simple Loan YTM",content:"<p><span class=\"wk-key\">Yield to maturity (YTM)</span> is the interest rate that equates the present value of all future cash flow payments with the instrument\u2019s value today. It is the <b>most accurate measure</b> of interest rates.</p><div class=\"wk-formula\">Simple Loan YTM:\n$100 = $110 / (1 + i)\u00b9\n(1 + i) = $110 / $100\ni = 0.10 = 10%\n\nFor simple loans, the simple interest rate EQUALS the yield to maturity.</div>"},
{title:"Fixed-Payment Loan YTM",content:"<div class=\"wk-formula\">Fixed-Payment Loan:\nLV = FP/(1+i) + FP/(1+i)\u00b2 + FP/(1+i)\u00b3 + ... + FP/(1+i)\u207f\n\nLV = loan value\nFP = fixed yearly payment\nn = number of years until maturity\n\nThe YTM is found by solving this equation for i (typically requires financial calculator or numerical methods).</div>"},
{title:"Coupon Bond YTM",content:"<div class=\"wk-formula\">Coupon Bond:\nP = C/(1+i) + C/(1+i)\u00b2 + ... + C/(1+i)\u207f + F/(1+i)\u207f\n\nP = price of bond\nC = yearly coupon payment\nF = face value\nn = years to maturity date</div><p>A coupon bond is identified by four pieces of information: <b>face value, issuer, maturity date, and coupon rate</b>.</p><p><b>Three key properties:</b></p><ul><li>When P = F (priced at par), yield to maturity <b>equals</b> the coupon rate</li><li>Bond price and YTM are <b>negatively related</b></li><li>YTM > coupon rate when P < F (discount); YTM < coupon rate when P > F (premium)</li></ul><table class=\"wk-table\"><tr><th>Price ($)</th><th>YTM (%)</th></tr><tr><td>1,200</td><td>7.13</td></tr><tr><td>1,100</td><td>8.48</td></tr><tr><td>1,000</td><td>10.00</td></tr><tr><td>900</td><td>11.75</td></tr><tr><td>800</td><td>13.81</td></tr></table><p style=\"font-size:12px;color:#888\">Table: 10%-Coupon-Rate Bond, 10 years, Face=$1,000</p>"},
{title:"Consol (Perpetuity) & Current Yield",content:"<p>A <span class=\"wk-key\">consol</span> or <span class=\"wk-key\">perpetuity</span> is a bond with <b>no maturity date</b> that pays fixed coupon payments forever.</p><div class=\"wk-formula\">Consol price: P\u1d9c = C / i\u1d9c\nConsol yield: i\u1d9c = C / P\u1d9c\n\nP\u1d9c = price of the consol\nC = yearly interest payment\ni\u1d9c = yield to maturity of the consol</div><p>For regular coupon bonds, i\u1d9c = C/P gives the <span class=\"wk-key\">current yield</span> \u2014 an easy-to-calculate <b>approximation</b> of YTM. It\u2019s a better approximation when the bond\u2019s price is closer to par and when maturity is longer.</p>"},
{title:"Discount Bond YTM",content:"<div class=\"wk-formula\">Discount Bond (one year):\ni = (F \u2212 P) / P\n\nF = face value\nP = current price\n\nThe yield equals the price increase over the year divided by the initial price.</div><div class=\"wk-exam\">\ud83d\udcdd As with coupon bonds, YTM is negatively related to the current bond price. This inverse price-yield relationship is one of the most fundamental concepts in finance.</div>"},
]},
{head:"Interest Rates vs Returns",num:"3",cards:[
{title:"Rate of Return Formula",content:"<p>The <span class=\"wk-key\">rate of return</span> measures the payments to the owner plus the change in value, expressed as a fraction of the purchase price:</p><div class=\"wk-formula\">RET = C/P\u209c + (P\u209c\u208a\u2081 \u2212 P\u209c)/P\u209c\n     = i\u1d9c + g\n\nRET = return from holding bond from time t to t+1\nC/P\u209c = current yield (i\u1d9c)\n(P\u209c\u208a\u2081 \u2212 P\u209c)/P\u209c = rate of capital gain (g)</div>"},
{title:"Key Insights on Returns vs YTM",content:"<ul><li>Return <b>equals</b> YTM only if the holding period equals the time to maturity</li><li>A rise in interest rates causes a <b>fall</b> in bond prices, resulting in <b>capital loss</b> if maturity > holding period</li><li>The more distant a bond\u2019s maturity, the <b>greater</b> the percentage price change from a given interest rate change</li><li>Even bonds with substantial initial interest rates can have <b>negative returns</b> if rates rise enough</li></ul><table class=\"wk-table\"><tr><th>Years to Maturity</th><th>Initial Price ($)</th><th>Price Next Year ($)</th><th>Capital Gain (%)</th><th>Return (%)</th></tr><tr><td>30</td><td>1,000</td><td>503</td><td>\u221249.7</td><td>\u221239.7</td></tr><tr><td>10</td><td>1,000</td><td>597</td><td>\u221240.3</td><td>\u221230.3</td></tr><tr><td>5</td><td>1,000</td><td>741</td><td>\u221225.9</td><td>\u221215.9</td></tr><tr><td>2</td><td>1,000</td><td>917</td><td>\u22128.3</td><td>+1.7</td></tr><tr><td>1</td><td>1,000</td><td>1,000</td><td>0.0</td><td>+10.0</td></tr></table><p style=\"font-size:12px;color:#888\">10%-Coupon bonds when rates rise from 10% to 20%</p><div class=\"wk-highlight\">\ud83d\udca1 <b>Interest-rate risk:</b> Prices and returns for long-term bonds are MORE volatile than shorter-term bonds. There is NO interest-rate risk for any bond whose time to maturity matches the holding period.</div>"},
]},
{head:"Real vs Nominal Interest Rates",num:"4",cards:[
{title:"The Fisher Equation",content:"<p><span class=\"wk-key\">Nominal interest rate</span> makes no allowance for inflation. <span class=\"wk-key\">Real interest rate</span> is adjusted for changes in the price level \u2014 it more accurately reflects the true cost of borrowing.</p><div class=\"wk-formula\">Fisher Equation: i = i\u1d63 + \u03c0\u1d49\n\ni = nominal interest rate\ni\u1d63 = real interest rate\n\u03c0\u1d49 = expected inflation rate\n\nRearranged: i\u1d63 = i \u2212 \u03c0\u1d49</div><ul><li><span class=\"wk-key\">Ex ante</span> real interest rate: adjusted for <b>expected</b> changes in price level</li><li><span class=\"wk-key\">Ex post</span> real interest rate: adjusted for <b>actual</b> changes in price level</li></ul><div class=\"wk-exam\">\ud83d\udcdd When the real interest rate is low, there are greater incentives to borrow and fewer incentives to lend. The real rate is the better indicator of incentives to borrow and lend. Interest rates do NOT always have to be positive \u2014 Japan and several European countries have experienced negative nominal rates.</div>"},
]},
]},

week5:{
title:"Week 5 \u2014 The Behavior of Interest Rates",
subtitle:"Mishkin Ch. 5 (12th Global Ed.) \u00b7 Asset Demand, Bond Market S&D (Loanable Funds), Liquidity Preference Framework, Money Growth & Interest Rates",
sections:[
{head:"Determinants of Asset Demand",num:"1",cards:[
{title:"What Is an Asset?",content:"<p>An <span class=\"wk-key\">asset</span> is anything that can be owned and has value. You hold a variety of assets: cash, bank deposits, bonds, stocks, real estate. The key question of this chapter: <b>what determines how much of each asset people want to hold?</b></p><div class=\"wk-highlight\">\ud83d\udca1 This is fundamental because the demand for bonds (and money) determines interest rates. Understanding asset demand = understanding why interest rates move.</div>"},
{title:"Theory of Portfolio Choice",content:"<p>The quantity demanded of an asset depends on <b>four factors</b>, holding all else constant:</p><table class=\"wk-table\"><tr><th>Factor</th><th>Change</th><th>Quantity Demanded</th><th>Why</th></tr><tr><td><span class=\"wk-key\">Wealth</span></td><td>\u2191</td><td>\u2191</td><td>More resources \u2192 buy more of all assets</td></tr><tr><td><span class=\"wk-key\">Expected return</span> (vs alternatives)</td><td>\u2191</td><td>\u2191</td><td>Higher return makes this asset more attractive</td></tr><tr><td><span class=\"wk-key\">Risk</span> (vs alternatives)</td><td>\u2191</td><td>\u2193</td><td>More uncertainty \u2192 risk-averse investors shy away</td></tr><tr><td><span class=\"wk-key\">Liquidity</span> (vs alternatives)</td><td>\u2191</td><td>\u2191</td><td>Easier to convert to cash \u2192 more desirable</td></tr></table><div class=\"wk-exam\">\ud83d\udcdd CRITICAL: All four factors are assessed <b>RELATIVE to alternative assets</b>. An increase in the expected return of stocks doesn\u2019t just increase stock demand \u2014 it <b>also decreases</b> bond demand (substitution effect). On exams, always state \u201crelative to alternative assets.\u201d</div>"},
{title:"Applying Portfolio Choice: Bonds vs Money",content:"<p>Consider the choice between holding bonds and holding money:</p><ul><li><b>Bonds:</b> earn interest (positive expected return) but cannot be spent directly (lower liquidity) and carry price risk (risk)</li><li><b>Money:</b> earns zero or low return but is perfectly liquid and has no price risk</li></ul><p>As <b>interest rates rise</b>: bonds become more attractive (higher return) relative to money \u2192 demand for bonds increases \u2192 demand for money decreases. This is the foundation of the downward-sloping money demand curve.</p>"},
]},
{head:"Bond Market: Supply, Demand & Equilibrium",num:"2",cards:[
{title:"The Bond Price\u2013Interest Rate Relationship",content:"<p>Before analyzing supply and demand, recall the <b>fundamental inverse relationship</b>:</p><div class=\"wk-formula\">Discount bond: i = (F \u2212 P) / P\nConsol/perpetuity: i\u1d9c = C / P\u1d9c\n\nAs P \u2191  \u2192  i \u2193  (always)\nAs P \u2193  \u2192  i \u2191  (always)</div><p>This means we can plot the bond market with <b>price on the vertical axis</b> (left side) and the corresponding <b>interest rate on the right side</b> \u2014 they move in opposite directions.</p>"},
{title:"Demand Curve for Bonds",content:"<p>The demand curve for bonds slopes <b>downward in price</b> (equivalently, upward in yield):</p><ul><li>At <b>lower prices</b> (higher interest rates), bonds offer higher expected returns relative to alternatives \u2192 quantity demanded is <b>higher</b></li><li>At <b>higher prices</b> (lower interest rates), bonds offer lower expected returns \u2192 quantity demanded is <b>lower</b></li></ul><div class=\"wk-formula\">Example (discount bond, F = $1,000):\n\nPrice = $950 \u2192 i = (1000\u2212950)/950 = 5.3% \u2192 B\u1d48 = $100B\nPrice = $900 \u2192 i = 11.1% \u2192 B\u1d48 = $200B\nPrice = $850 \u2192 i = 17.6% \u2192 B\u1d48 = $300B (equilibrium)\nPrice = $800 \u2192 i = 25.0% \u2192 B\u1d48 = $400B\nPrice = $750 \u2192 i = 33.0% \u2192 B\u1d48 = $500B</div>"},
{title:"Supply Curve for Bonds",content:"<p>The supply curve for bonds slopes <b>upward in price</b>:</p><ul><li>At <b>higher prices</b> (lower interest rates), borrowing is cheaper \u2192 firms and government <b>supply more</b> bonds</li><li>At <b>lower prices</b> (higher interest rates), borrowing is expensive \u2192 <b>less</b> bond issuance</li></ul><p><b>Who supplies bonds?</b> Firms (to finance investment), the government (to finance deficits), and financial institutions. They are the <b>borrowers</b> \u2014 issuing bonds is how they borrow.</p>"},
{title:"Market Equilibrium",content:"<p><span class=\"wk-key\">Market equilibrium</span> occurs when B\u1d48 = B\u02e2 \u2014 the quantity of bonds people want to buy equals the quantity sellers want to issue.</p><ul><li>B\u1d48 > B\u02e2 (excess demand) \u2192 buyers compete \u2192 price <b>rises</b> \u2192 interest rate <b>falls</b> \u2192 toward equilibrium</li><li>B\u1d48 < B\u02e2 (excess supply) \u2192 sellers compete \u2192 price <b>falls</b> \u2192 interest rate <b>rises</b> \u2192 toward equilibrium</li></ul><div class=\"wk-highlight\">\ud83d\udca1 This is the <b>loanable funds framework</b>: the bond market is where lenders (bond buyers) supply funds and borrowers (bond issuers) demand funds. The interest rate is the \u201cprice\u201d of borrowing. Equilibrium: P* = $850, i* = 17.6%, Q* = $300B.</div>"},
{title:"Factors That Shift Bond Demand",content:"<p>Changes in these factors shift the <b>entire demand curve</b> (not movement along it):</p><table class=\"wk-table\"><tr><th>Variable \u2191</th><th>Effect on Bond Demand</th><th>Curve Shifts</th><th>P* and i*</th></tr><tr><td><b>Wealth</b> (business expansion)</td><td>\u2191 buy more bonds</td><td>Right \u2192</td><td>P\u2191, i\u2193</td></tr><tr><td><b>Expected future interest rates</b></td><td>\u2193 lower expected return on LT bonds (capital loss)</td><td>Left \u2190</td><td>P\u2193, i\u2191</td></tr><tr><td><b>Expected inflation (\u03c0\u1d49)</b></td><td>\u2193 lower real return on bonds</td><td>Left \u2190</td><td>P\u2193, i\u2191</td></tr><tr><td><b>Riskiness of bonds</b> (vs alternatives)</td><td>\u2193 less attractive</td><td>Left \u2190</td><td>P\u2193, i\u2191</td></tr><tr><td><b>Liquidity of bonds</b> (vs alternatives)</td><td>\u2191 more attractive</td><td>Right \u2192</td><td>P\u2191, i\u2193</td></tr></table>"},
{title:"Factors That Shift Bond Supply",content:"<p>Borrowers\u2019 behavior determines bond supply:</p><table class=\"wk-table\"><tr><th>Variable \u2191</th><th>Effect on Bond Supply</th><th>Curve Shifts</th><th>P* and i*</th></tr><tr><td><b>Profitability of investments</b> (expansion)</td><td>\u2191 more borrowing</td><td>Right \u2192</td><td>P\u2193, i\u2191</td></tr><tr><td><b>Expected inflation (\u03c0\u1d49)</b></td><td>\u2191 cheaper to repay in real terms</td><td>Right \u2192</td><td>P\u2193, i\u2191</td></tr><tr><td><b>Government deficit</b></td><td>\u2191 more bond issuance to finance deficit</td><td>Right \u2192</td><td>P\u2193, i\u2191</td></tr></table><div class=\"wk-exam\">\ud83d\udcdd Notice that <b>expected inflation</b> shifts BOTH demand (LEFT) and supply (RIGHT). Both shifts reinforce each other \u2192 bond price falls \u2192 interest rate rises. This is the <b>Fisher Effect</b>.</div>"},
{title:"The Fisher Effect: Expected Inflation \u2192 Interest Rates",content:"<p>The most important application of bond S&D analysis:</p><div class=\"wk-formula\">When expected inflation (\u03c0\u1d49) rises:\n\nStep 1: Bond demand shifts LEFT\n  (lower expected real return \u2192 bonds less attractive)\n\nStep 2: Bond supply shifts RIGHT\n  (cheaper to repay in real terms \u2192 borrow more)\n\nStep 3: BOTH shifts push bond price DOWN\n  \u2192 interest rate RISES\n\nResult: \u0394i \u2248 \u0394\u03c0\u1d49 (Fisher equation: i = r + \u03c0\u1d49)</div><div class=\"wk-highlight\">\ud83d\udca1 Empirical evidence (1953\u20132017): expected inflation and 3-month T-bill rates track each other closely, confirming the Fisher Effect. This is one of the best-documented relationships in monetary economics.</div>"},
{title:"Business Cycle & Interest Rates",content:"<p>During a <b>business cycle expansion</b>:</p><ol><li><b>Bond supply shifts RIGHT</b> (dominant): profitable investment opportunities \u2192 firms borrow more aggressively</li><li><b>Bond demand shifts RIGHT</b> (smaller): rising income \u2192 higher wealth \u2192 more saving, but less than borrowing increase</li><li><b>Net effect:</b> supply shift > demand shift \u2192 P* falls \u2192 <b>i* rises</b></li></ol><p>During a <b>recession</b>: the reverse \u2014 rates fall because borrowing needs decline more than saving.</p><div class=\"wk-exam\">\ud83d\udcdd Empirical fact: interest rates are <b>procyclical</b> \u2014 they rise during expansions and fall during recessions. The 3-month T-bill rate data from 1951\u20132017 clearly shows this pattern, with shaded recession bars corresponding to rate declines.</div>"},
]},
{head:"Money Market: The Liquidity Preference Framework",num:"3",cards:[
{title:"Keynesian Liquidity Preference",content:"<p>Keynes\u2019s framework determines the interest rate through <b>supply and demand for money</b> rather than bonds.</p><p><b>Key insight (Walras\u2019 Law):</b> There are only two categories of assets: money and bonds. Total wealth:</p><div class=\"wk-formula\">B\u02e2 + M\u02e2 = B\u1d48 + M\u1d48\n\nRearranging:\nB\u02e2 \u2212 B\u1d48 = M\u1d48 \u2212 M\u02e2\n\nIf money market clears (M\u02e2 = M\u1d48)\n\u2192 then bond market also clears (B\u02e2 = B\u1d48)\n\n\u2192 We can use EITHER framework!\n   Both give the SAME equilibrium interest rate.</div>"},
{title:"Money Demand Curve",content:"<p>The money demand curve slopes <b>downward</b> with respect to the interest rate:</p><ul><li>As i <b>rises</b>: opportunity cost of holding money increases (you forgo more interest on bonds) \u2192 hold <b>less</b> money</li><li>As i <b>falls</b>: opportunity cost decreases \u2192 hold <b>more</b> money</li></ul><p><b>Money demand function:</b> M\u1d48 = L(Y, i) where \u2202L/\u2202Y > 0 and \u2202L/\u2202i < 0</p>"},
{title:"Money Supply Curve",content:"<p>The money supply is assumed to be controlled by the <b>central bank</b> and is therefore <b>independent</b> of the interest rate.</p><p>On a graph, M\u02e2 is a <b>vertical line</b> \u2014 the Fed sets M\u02e2 at a given level regardless of i.</p><p><b>Equilibrium:</b> where M\u02e2 intersects M\u1d48, determining i*.</p><ul><li>At i > i* \u2192 excess money supply \u2192 people buy bonds \u2192 bond price rises \u2192 i falls toward i*</li><li>At i < i* \u2192 excess money demand \u2192 people sell bonds \u2192 bond price falls \u2192 i rises toward i*</li></ul>"},
{title:"Shifts in Money Demand & Supply",content:"<table class=\"wk-table\"><tr><th>Variable \u2191</th><th>Shifts</th><th>Mechanism</th><th>Interest Rate</th></tr><tr><td><b>Income (Y)</b></td><td>M\u1d48 right</td><td>Higher income \u2192 more transactions \u2192 need more money; wealth \u2191 \u2192 want more money</td><td>\u2191</td></tr><tr><td><b>Price level (P)</b></td><td>M\u1d48 right</td><td>Higher prices \u2192 need more nominal money to buy the same real goods</td><td>\u2191</td></tr><tr><td><b>Money supply (M\u02e2)</b></td><td>M\u02e2 right</td><td>Fed increases reserves via OMOs \u2192 more money in circulation</td><td>\u2193</td></tr></table><div class=\"wk-highlight\">\ud83d\udca1 The liquidity preference framework is particularly useful for analyzing the effects of monetary policy (M\u02e2 changes), while the loanable funds framework is better for analyzing the Fisher effect (\u03c0\u1d49 changes). Both are valid and give the same answer.</div>"},
]},
{head:"Money Growth & Interest Rates: The Four Effects",num:"4",cards:[
{title:"Does Higher Money Growth Lower Interest Rates?",content:"<p>This is the <b>central question</b> of the chapter. The answer: <b>it depends on which effect dominates.</b></p><p>An increase in the money supply has <b>four</b> opposing effects on interest rates:</p>"},
{title:"Effect 1: Liquidity Effect (i \u2193)",content:"<p>The <b>immediate</b> effect. M\u02e2 shifts right \u2192 at the old i*, there is excess money supply \u2192 people use excess money to buy bonds \u2192 bond prices rise \u2192 i falls.</p><div class=\"wk-formula\">M\u02e2\u2191 \u2192 excess M\u02e2 \u2192 buy bonds \u2192 P_bond\u2191 \u2192 i\u2193\n\nThis is the standard textbook mechanism.\nIt operates IMMEDIATELY.</div>"},
{title:"Effect 2: Income Effect (i \u2191)",content:"<p>Lower interest rates stimulate the economy \u2192 Y rises \u2192 higher income increases money demand \u2192 M\u1d48 shifts RIGHT \u2192 i rises back up.</p><div class=\"wk-formula\">M\u02e2\u2191 \u2192 i\u2193 \u2192 I\u2191 + C\u2191 \u2192 Y\u2191 \u2192 M\u1d48\u2191 \u2192 i\u2191\n\nOperates with a LAG (takes time for Y to respond).</div>"},
{title:"Effect 3: Price-Level Effect (i \u2191)",content:"<p>More money eventually raises the price level \u2192 people need more nominal money \u2192 M\u1d48 shifts RIGHT \u2192 i rises.</p><div class=\"wk-formula\">M\u02e2\u2191 \u2192 P\u2191 (quantity theory) \u2192 M\u1d48\u2191 \u2192 i\u2191\n\nThis effect is PERMANENT: even after P stops rising,\nthe price level stays higher \u2192 M\u1d48 stays elevated.</div>"},
{title:"Effect 4: Expected-Inflation Effect (i \u2191)",content:"<p>If people expect that M\u2191 will cause inflation, they demand higher nominal rates via the Fisher equation.</p><div class=\"wk-formula\">M\u02e2\u2191 \u2192 \u03c0\u1d49\u2191 \u2192 i\u2191 (Fisher: i = r + \u03c0\u1d49)\n\nThis can be IMMEDIATE (if expectations adjust quickly)\nor SLOW (if people learn gradually).\nIt persists only while the price level continues to rise.</div><div class=\"wk-exam\">\ud83d\udcdd Key distinction: the price-level effect is PERMANENT (stays even after P stops rising). The expected-inflation effect is TEMPORARY (disappears when P stops rising and \u03c0\u1d49 returns to zero).</div>"},
{title:"Three Scenarios for Net Effect",content:"<table class=\"wk-table\"><tr><th>Scenario</th><th>Condition</th><th>Net Effect on i</th></tr><tr><td><b>(a) Liquidity dominates</b></td><td>Liquidity effect > other effects</td><td>i stays BELOW original level</td></tr><tr><td><b>(b) Other effects dominate, slow \u03c0\u1d49</b></td><td>Other effects > liquidity, but inflation expectations adjust slowly</td><td>i initially falls, then RISES ABOVE original</td></tr><tr><td><b>(c) Fast \u03c0\u1d49 adjustment</b></td><td>Expected-inflation effect is immediate and dominant</td><td>i RISES immediately and stays higher</td></tr></table><div class=\"wk-highlight\">\ud83d\udca1 <b>Empirical evidence (1950\u20132017):</b> M2 growth and T-bill rates are <b>positively correlated</b> in the long run. This means the income, price-level, and expected-inflation effects dominate the liquidity effect. Countries with rapid money growth have HIGH, not low, interest rates. This is the most counterintuitive result of Chapter 5.</div>"},
]},
]},

week6:{
title:"Week 6 \u2014 The Risk and Term Structure of Interest Rates",
subtitle:"Mishkin Ch. 6 \u00b7 Default Risk, Liquidity, Taxes, Yield Curves, Expectations Theory, Liquidity Premium Theory",
sections:[
{head:"Risk Structure of Interest Rates",num:"1",cards:[
{title:"Why Same-Maturity Bonds Have Different Rates",content:"<p>Bonds with the <b>same maturity</b> can have different interest rates due to three factors:</p><ul><li><span class=\"wk-key\">Default risk:</span> probability the issuer cannot make interest payments or repay face value. U.S. Treasury bonds are considered <b>default-free</b> (government can raise taxes).</li><li><span class=\"wk-key\">Liquidity:</span> ease and speed of converting to cash. Treasury bonds are the most liquid; corporate bonds less so.</li><li><span class=\"wk-key\">Tax considerations:</span> municipal bond interest is exempt from federal income taxes.</li></ul>"},
{title:"Default Risk & Risk Premium",content:"<p>The <span class=\"wk-key\">risk premium</span> is the spread between interest rates on bonds with default risk and interest rates on same-maturity Treasury bonds.</p><p>When default risk on corporate bonds <b>increases</b>: demand for corporate bonds shifts LEFT (less desirable) \u2192 price falls \u2192 yield rises. Simultaneously, demand for Treasuries shifts RIGHT (flight to safety) \u2192 price rises \u2192 yield falls. The risk premium <b>widens</b>.</p><div class=\"wk-exam\">\ud83d\udcdd During the 2007\u20132009 financial crisis, the Baa\u2013Treasury spread widened dramatically as investors lost confidence in corporate borrowers and the reliability of credit ratings. This flight to quality is a hallmark of financial crises.</div>"},
{title:"Credit Ratings",content:"<table class=\"wk-table\"><tr><th>Moody\u2019s</th><th>S&P/Fitch</th><th>Grade</th></tr><tr><td>Aaa</td><td>AAA</td><td>Prime / Maximum Safety</td></tr><tr><td>Aa1\u2013Aa3</td><td>AA+/AA/AA\u2013</td><td>High Grade</td></tr><tr><td>A1\u2013A3</td><td>A+/A/A\u2013</td><td>Upper Medium Grade</td></tr><tr><td>Baa1\u2013Baa3</td><td>BBB+/BBB/BBB\u2013</td><td>Lower Medium (Investment Grade floor)</td></tr><tr><td>Ba1 and below</td><td>BB+ and below</td><td>Speculative / Junk</td></tr></table><p>The dividing line between <b>investment grade</b> (Baa3/BBB\u2212 and above) and <b>speculative/junk</b> (Ba1/BB+ and below) is critical \u2014 many institutional investors are restricted to investment-grade bonds only.</p>"},
{title:"Tax Advantages of Municipal Bonds",content:"<p>Municipal bond interest is <b>exempt from federal income taxes</b>. This makes them attractive to high-income taxpayers despite lower nominal yields.</p><p>The tax-free status shifts demand for municipals RIGHT \u2192 price rises \u2192 yield falls. Simultaneously, demand for taxable Treasuries shifts LEFT \u2192 price falls \u2192 yield rises. Result: municipal bonds can have <b>lower interest rates</b> than Treasury bonds despite having higher default risk.</p><div class=\"wk-highlight\">\ud83d\udca1 When Congress raises income tax rates (e.g., 2013 Obama tax increase from 35% to 39.6%), the tax advantage of municipals increases \u2192 muni demand rises \u2192 muni\u2013Treasury spread narrows further.</div>"},
]},
{head:"Term Structure of Interest Rates",num:"2",cards:[
{title:"Yield Curves & Three Empirical Facts",content:"<p>A <span class=\"wk-key\">yield curve</span> plots the yield on bonds with differing terms to maturity but identical risk, liquidity, and tax characteristics.</p><p>Shapes: <b>upward-sloping</b> (long > short), <b>flat</b> (long = short), <b>inverted</b> (long < short).</p><p>Three facts any theory must explain:</p><ol><li>Interest rates on bonds of different maturities <b>move together</b> over time</li><li>When short-term rates are <b>low</b>, yield curves tend to slope <b>up</b>; when short-term rates are <b>high</b>, yield curves tend to be <b>inverted</b></li><li>Yield curves <b>almost always</b> slope upward</li></ol>"},
{title:"Expectations Theory",content:"<p>The interest rate on a long-term bond equals an <b>average of short-term rates</b> expected to occur over the bond\u2019s life. Bonds of different maturities are <b>perfect substitutes</b>.</p><div class=\"wk-formula\">Two-period rate:\ni\u2082\u209c = (i\u209c + i\u1d49\u209c\u208a\u2081) / 2\n\nn-period rate:\ni\u2099\u209c = (i\u209c + i\u1d49\u209c\u208a\u2081 + i\u1d49\u209c\u208a\u2082 + ... + i\u1d49\u209c\u208a\u208d\u2099\u208b\u2081\u208e) / n</div><p>\u2705 Explains fact 1 (co-movement) and fact 2 (slope related to rate levels).</p><p>\u274c Cannot explain fact 3 (usual upward slope) \u2014 would require people to always expect rates to rise.</p>"},
{title:"Segmented Markets Theory",content:"<p>Bonds of different maturities are <b>not substitutes at all</b>. The interest rate for each maturity is determined by its own supply and demand.</p><p>Investors prefer shorter maturities (less interest-rate risk) \u2192 higher demand for short bonds \u2192 higher price \u2192 lower short rates \u2192 explains upward slope.</p><p>\u2705 Explains fact 3 (usual upward slope).</p><p>\u274c Cannot explain facts 1 and 2 (co-movement and slope patterns).</p>"},
{title:"Liquidity Premium & Preferred Habitat Theory",content:"<p>Combines both theories: the long-term rate equals the <b>average of expected short-term rates PLUS a liquidity premium</b> that increases with maturity.</p><div class=\"wk-formula\">i\u2099\u209c = (i\u209c + i\u1d49\u209c\u208a\u2081 + ... + i\u1d49\u209c\u208a\u208d\u2099\u208b\u2081\u208e) / n + l\u2099\u209c\n\nl\u2099\u209c = liquidity premium for n-period bond at time t\nl\u2099\u209c > 0 always, and RISES with n</div><p>\u2705 Explains ALL three facts:</p><ul><li>Fact 1 (co-movement): first term \u2014 expected short rates drive long rates</li><li>Fact 2 (slope patterns): low current short rates \u2192 expect rates to rise \u2192 plus liquidity premium \u2192 steep upward slope. High current short rates \u2192 expect rates to fall \u2192 can overcome liquidity premium \u2192 inverted curve</li><li>Fact 3 (usual upward slope): positive liquidity premium biases yield curve upward</li></ul><div class=\"wk-exam\">\ud83d\udcdd The <b>preferred habitat theory</b> says investors prefer specific maturities but will switch if compensated with higher expected returns. This gives the same result as the liquidity premium theory \u2014 both predict positive, increasing term premiums.</div>"},
{title:"Interpreting Yield Curve Shapes",content:"<table class=\"wk-table\"><tr><th>Yield Curve Shape</th><th>What It Signals (Liquidity Premium Theory)</th></tr><tr><td>Steeply upward-sloping</td><td>Short rates expected to RISE</td></tr><tr><td>Mildly upward-sloping</td><td>Short rates expected to stay roughly UNCHANGED</td></tr><tr><td>Flat</td><td>Short rates expected to FALL moderately</td></tr><tr><td>Inverted (downward-sloping)</td><td>Short rates expected to FALL sharply</td></tr></table><div class=\"wk-highlight\">\ud83d\udca1 An inverted yield curve is a famous recession predictor. It signals that the market expects sharp rate cuts \u2014 which the central bank typically only does during economic downturns. Historically, every U.S. recession since the 1950s has been preceded by a yield curve inversion.</div>"},
]},
]},

week7:{title:"Week 7 \u2014 The Stock Market, Rational Expectations & the Efficient Market Hypothesis",
subtitle:"Mishkin Ch. 7 \u00b7 Stock Valuation, Gordon Growth Model, Rational Expectations, EMH, Behavioral Finance",
sections:[
{head:"Computing the Price of Common Stock",num:"1",cards:[
{title:"The One-Period Valuation Model",content:"<p>To value a stock you hold for <b>one period</b>, the current price equals the present value of next year\u2019s dividend plus the present value of the expected sale price:</p><div class=\"wk-formula\">P\u2080 = Div\u2081 / (1 + k\u2091) + P\u2081 / (1 + k\u2091)\n\nP\u2080 = current price of the stock\nDiv\u2081 = dividend paid at end of year 1\nk\u2091 = required return on equity investment\nP\u2081 = expected sale price at end of year 1</div><div class=\"wk-highlight\">\ud83d\udca1 This is just the <b>present value</b> concept applied to stocks. The required return k\u2091 reflects the investor\u2019s opportunity cost \u2014 what they could earn on equally risky investments.</div>"},
{title:"The Generalized Dividend Valuation Model",content:"<p>Extending to multiple periods, the stock price today equals the present value of all future cash flows:</p><div class=\"wk-formula\">P\u2080 = D\u2081/(1+k\u2091)\u00b9 + D\u2082/(1+k\u2091)\u00b2 + ... + D\u2099/(1+k\u2091)\u207f + P\u2099/(1+k\u2091)\u207f</div><p>If the holding period extends far into the future, the final sale price P\u2099 becomes negligible (discounted to near zero). The stock price then depends <b>only</b> on the present value of the future dividend stream:</p><div class=\"wk-formula\">P\u2080 = \u03a3 D\u209c / (1 + k\u2091)\u1d57  for t = 1 to \u221e</div><div class=\"wk-exam\">\ud83d\udcdd This is the fundamental insight: a stock\u2019s value comes entirely from its expected future dividends. Even investors who buy for capital gains implicitly depend on dividends \u2014 because the next buyer\u2019s willingness to pay also depends on expected dividends.</div>"},
{title:"The Gordon Growth Model",content:"<p>Assumes dividends grow at a <b>constant rate g forever</b>, and g < k\u2091. This simplifies the infinite sum to a clean formula:</p><div class=\"wk-formula\">P\u2080 = D\u2080(1 + g) / (k\u2091 \u2212 g) = D\u2081 / (k\u2091 \u2212 g)\n\nD\u2080 = most recent dividend paid\ng = expected constant growth rate in dividends\nk\u2091 = required return on equity\nCondition: k\u2091 > g</div><p><b>What makes stock prices change?</b></p><ul><li><b>D\u2081 \u2191</b> (higher expected dividend) \u2192 P\u2080 \u2191</li><li><b>k\u2091 \u2191</b> (higher required return / more risk) \u2192 P\u2080 \u2193</li><li><b>g \u2191</b> (faster expected growth) \u2192 P\u2080 \u2191 (denominator shrinks)</li></ul><div class=\"wk-highlight\">\ud83d\udca1 The Gordon model is deceptively simple but powerful. It shows that stock prices are driven by only three forces: expected cash flows, risk (required return), and growth expectations. Every piece of stock market news ultimately affects one of these three.</div>"},
]},
{head:"How the Market Sets Prices",num:"2",cards:[
{title:"Price-Setting Mechanism",content:"<p>Key principles of how market prices are determined:</p><ul><li>The price is set by the buyer willing to pay the <b>highest price</b></li><li>The market price reflects the buyer who can <b>take best advantage</b> of the asset</li><li>Superior <b>information</b> about an asset can increase its value by reducing its perceived risk (lowering k\u2091)</li></ul><p>Market participants constantly receive new information and revise their expectations, which is why stock prices change frequently.</p>"},
{title:"Application: The Global Financial Crisis and the Stock Market",content:"<p>The 2007\u20132009 financial crisis provides a perfect application of the Gordon model to explain the stock market crash:</p><div class=\"wk-formula\">Crisis effects on Gordon model:\n1. Growth prospects revised DOWN \u2192 g\u2193\n2. Uncertainty increased \u2192 k\u2091\u2191\n\nP\u2080 = D\u2081 / (k\u2091 \u2212 g)\n\u2022 g\u2193 makes denominator LARGER \u2192 P\u2080\u2193\n\u2022 k\u2091\u2191 makes denominator LARGER \u2192 P\u2080\u2193\n\u2022 Both effects REINFORCE each other \u2192 sharp drop</div><div class=\"wk-exam\">\ud83d\udcdd This is a favorite exam application: use the Gordon model to explain any stock market crash. Identify which variable changed (D, k\u2091, or g) and trace through the formula. The 2008 crash involved BOTH lower g (recession fears) AND higher k\u2091 (heightened risk/uncertainty).</div>"},
]},
{head:"The Theory of Rational Expectations",num:"3",cards:[
{title:"Adaptive vs Rational Expectations",content:"<p><b>Adaptive expectations</b> are formed from <b>past experience only</b>. Under adaptive expectations, changes occur <b>slowly</b> over time as data changes.</p><p>The problem: people actually use more than just past data. They also consider current conditions, news, policy announcements, and other available information \u2014 and sometimes change their expectations quickly.</p><p><b>Rational expectations</b> solve this by stating that expectations will be identical to <b>optimal forecasts</b> using all available information:</p><div class=\"wk-formula\">X\u1d49 = X\u1d52\u1da0\n\nX\u1d49 = expectation of the variable being forecast\nX\u1d52\u1da0 = optimal forecast using all available information</div>"},
{title:"Key Properties of Rational Expectations",content:"<ul><li>Even though rational expectations equal the <b>optimal forecast</b>, the prediction may <b>not always be accurate</b>. Two reasons: (1) gathering information has costs, and (2) the predictor may be unaware of some relevant information.</li><li>If there is a <b>change in the way a variable moves</b>, the way expectations are formed will also change (e.g., change in monetary policy regime).</li><li>The <b>forecast errors</b> of rational expectations will, on average, be <b>zero</b> and cannot be predicted ahead of time.</li></ul><div class=\"wk-highlight\">\ud83d\udca1 Rational expectations does NOT mean people are perfectly accurate. It means they are making their <b>best possible guess</b> given what they know. Systematic errors would mean leaving money on the table \u2014 rational agents exploit and eliminate such patterns.</div>"},
]},
{head:"The Efficient Market Hypothesis",num:"4",cards:[
{title:"From Rational Expectations to EMH",content:"<p>Applying rational expectations to financial markets yields the <b>Efficient Market Hypothesis (EMH)</b>.</p><p>Recall the rate of return formula:</p><div class=\"wk-formula\">R = (P\u209c\u208a\u2081 \u2212 P\u209c + C) / P\u209c\n\nR = rate of return\nP\u209c = price at beginning (known)\nP\u209c\u208a\u2081 = price at end (unknown \u2192 must forecast)\nC = cash payment (coupon/dividend)</div><p>Since P\u209c and C are known, the expected return R\u1d49 depends on the expected future price P\u1d49\u209c\u208a\u2081. By rational expectations, P\u1d49\u209c\u208a\u2081 = P\u1d52\u1da0\u209c\u208a\u2081, so R\u1d49 = R\u1d52\u1da0.</p><p>Supply and demand in efficient markets set R\u1d49 equal to the equilibrium return R*, so <b>R\u1d52\u1da0 = R*</b>.</p>"},
{title:"Statement of the EMH",content:"<p>Two equivalent statements:</p><ul><li>Current prices in a financial market will be set so that the <b>optimal forecast of a security\u2019s return</b> using all available information equals the security\u2019s <b>equilibrium return</b>.</li><li>In an efficient market, a security\u2019s price <b>fully reflects all available information</b>.</li></ul><div class=\"wk-formula\">Arbitrage mechanism:\n\nIf R\u1d52\u1da0 > R* \u2192 P\u209c \u2191 \u2192 R\u1d52\u1da0 \u2193 (toward R*)\nIf R\u1d52\u1da0 < R* \u2192 P\u209c \u2193 \u2192 R\u1d52\u1da0 \u2191 (toward R*)\n\nUntil R\u1d52\u1da0 = R*\n\n\u2192 All unexploited profit opportunities are eliminated</div>"},
{title:"Implications for Investors",content:"<ul><li><b>Investment advisor reports</b> contain information that is readily available and already reflected in market prices \u2192 acting on this information will NOT yield abnormally high returns, on average.</li><li>A <b>hot tip</b> is probably already incorporated into the price.</li><li>Stock prices respond to announcements only when the information is <b>new and unexpected</b>.</li><li>A <b>\u201cbuy and hold\u201d strategy</b> is the most sensible approach for small investors \u2014 you cannot consistently beat the market.</li></ul><div class=\"wk-exam\">\ud83d\udcdd The EMH does NOT say you can\u2019t make money in the stock market. It says you can\u2019t consistently earn ABOVE-NORMAL returns (i.e., beat the market) using publicly available information. You still earn the equilibrium return R*.</div>"},
{title:"EMH \u2260 Markets Are Always Right",content:"<p>Important nuance: the EMH says prices are <b>unpredictable</b>, not that they are always <b>correct</b>.</p><ul><li>Some economists believe all prices always reflect <b>market fundamentals</b> (items with direct impact on future income streams), making financial markets truly efficient.</li><li>However, the <b>unpredictability of prices</b> casts doubt on this stronger claim \u2014 unpredictability can result from irrational behavior as well as from rational processing of information.</li></ul><div class=\"wk-highlight\">\ud83d\udca1 This is a subtle but crucial exam distinction. The EMH (prices reflect available information \u2192 R\u1d52\u1da0 = R*) is NOT the same as saying markets always correctly value assets. Prices can be \u201cwrong\u201d (deviate from fundamentals) and still be unpredictable.</div>"},
]},
{head:"Behavioral Finance",num:"5",cards:[
{title:"Challenges to EMH from Behavioral Finance",content:"<p>Behavioral finance uses psychology to explain observed market phenomena that are hard to reconcile with the EMH:</p><ul><li><b>Loss aversion:</b> People feel losses more acutely than equivalent gains. This explains the <b>lack of short selling</b> \u2014 investors are reluctant to realize losses, leading to overpriced stocks persisting longer than EMH predicts.</li><li><b>Overconfidence:</b> Investors overestimate the precision of their private information and their ability to pick winners. This explains the <b>large trading volume</b> observed in markets \u2014 in a pure EMH world, there would be very little trading since no one has superior information.</li><li><b>Social contagion:</b> Investor enthusiasm spreads like a virus. Combined with overconfidence, this helps explain <b>stock market bubbles</b> \u2014 prices can deviate significantly from fundamentals for extended periods.</li></ul><div class=\"wk-exam\">\ud83d\udcdd Behavioral finance doesn\u2019t necessarily reject the idea that markets are competitive. Rather, it argues that psychological biases can create systematic deviations from rational behavior, leading to predictable (though hard to exploit) mispricings.</div>"},
]},
]},
};

var _weekCharts=[];
function renderWeekGraphs(wk){
  _weekCharts.forEach(function(c){try{c.destroy()}catch(e){}});_weekCharts=[];
  var ids=WEEK_GRAPHS[wk]||[];
  var el=document.getElementById('wk-graphs-panel');
  if(!ids.length){el.innerHTML='<div class="wk-coming">No graphs for this week.</div>';return}
  var h='<div class="qz-intro">\ud83d\udcca <b>Interactive Graphs & Exam Scenarios</b><br>Click scenario buttons to simulate curve shifts with step-by-step explanations.</div>';
  ids.forEach(function(id){
    var m=WG_META[id];if(!m)return;
    h+='<div class="wk-card" style="border-left:4px solid '+m.color+'" id="wg-card-'+id+'"><h4 style="color:'+m.color+'">'+m.title+'</h4>';
    h+='<p style="font-size:12.5px;color:#666;margin-bottom:10px">'+m.desc+'</p>';
    h+='<div style="background:#FAFAF8;border:1px solid #ECEAE6;border-radius:8px;padding:12px;margin-bottom:4px"><canvas id="wgc-'+id+'" height="240"></canvas></div>';
    if(m.scenarios&&m.scenarios.length){
      h+='<div class="scenario-bar"><span class="scenario-bar-label">\ud83d\udccb EXAM SCENARIOS \u2014 CLICK TO SIMULATE</span>';
      m.scenarios.forEach(function(sc){h+='<button class="sc-btn" onclick="runScenario(\''+id+'\',\''+sc.id+'\')" id="scb-'+id+'-'+sc.id+'">'+sc.name+'</button>';});
      h+='<button class="sc-btn reset" onclick="runScenario(\''+id+'\',\'reset\')">\u21bb Reset</button></div>';
    }
    h+='<div id="wg-steps-'+id+'"></div>';
    if(m.insight)h+='<div class="wk-exam" style="margin-top:6px">\ud83d\udcdd '+m.insight+'</div>';
    h+='</div>';
  });
  el.innerHTML=h;
  setTimeout(function(){
    ids.forEach(function(id){
      var m=WG_META[id];if(!m)return;
      var cv=document.getElementById('wgc-'+id);if(!cv)return;
      var cfg=m.chart();
      var opts={responsive:true,maintainAspectRatio:false,animation:{duration:600},plugins:{legend:{display:true,labels:{boxWidth:10,font:{size:10,family:'Inter'}}},tooltip:{enabled:true}},scales:{}};
      if(cfg.options&&cfg.options.scales){for(var ax in cfg.options.scales){opts.scales[ax]={...cfg.options.scales[ax],grid:{color:'#EDEDEA'},ticks:{font:{size:9,family:'Inter'}},title:{...cfg.options.scales[ax].title,font:{size:10,family:'Inter',weight:'600'}}}}}
      if(cfg.options&&cfg.options.plugins)Object.assign(opts.plugins,cfg.options.plugins);
      var c=new Chart(cv.getContext('2d'),{type:cfg.type,data:cfg.data,options:opts});
      c._wgId=id;c._baseData=JSON.parse(JSON.stringify(cfg.data));_weekCharts.push(c);
    });
  },80);
}
function runScenario(gid,sid){
  var m=WG_META[gid];if(!m)return;
  var chart=_weekCharts.find(function(c){return c._wgId===gid});if(!chart)return;
  var stepsEl=document.getElementById('wg-steps-'+gid);
  document.querySelectorAll('#wg-card-'+gid+' .sc-btn').forEach(function(b){b.classList.remove('active')});
  if(sid==='reset'){chart.data=JSON.parse(JSON.stringify(chart._baseData));chart.update();if(stepsEl)stepsEl.innerHTML='';return;}
  var sc=m.scenarios.find(function(s){return s.id===sid});if(!sc)return;
  document.getElementById('scb-'+gid+'-'+sid).classList.add('active');
  var newCfg=sc.data();chart.data=newCfg.data;chart.update();
  if(stepsEl&&sc.steps){
