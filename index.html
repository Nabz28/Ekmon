// ====================== WEEKLY MATERIALS RENDERER ======================
function renderWeek(wk){
  var w=WEEKS[wk];if(!w)return;
  window._currentWeek=wk;
  var el=document.getElementById('week-view');
  var hasGraphs=(WEEK_GRAPHS[wk]||[]).length>0;
  var h='<div class="wk-title">'+w.title+'</div>';
  h+='<div class="wk-mode-toggle" style="margin-top:10px">';
  h+='<button class="wk-mode-btn active" onclick="wkToggle(\'notes\',this)">\ud83d\udcdd Notes</button>';
  if(hasGraphs){h+='<button class="wk-mode-btn" onclick="wkToggle(\'graphs\',this)">\ud83d\udcca Graphs</button>';}
  else{h+='<button class="wk-mode-btn" disabled style="cursor:not-allowed;opacity:.4">\ud83d\udcca Graphs</button>';}
  h+='<button class="wk-mode-btn" onclick="wkToggle(\'formulas\',this)">\ud83d\udccf Formulas</button>';
  h+='<button class="wk-mode-btn" onclick="wkToggle(\'quiz\',this)">\ud83c\udfaf Quiz</button>';
  h+='</div>';
  h+='<div class="wk-subtitle">'+w.subtitle+'</div>';
  h+='<div id="wk-notes-panel">';
  if(w.sections.length>1 && w.sections[0].head!=='Coming Soon'){
    h+='<div class="wk-nav">';
    w.sections.forEach(function(s,i){h+='<button class="wk-nav-btn" onclick="document.getElementById(\'wk-sec-'+i+'\').scrollIntoView({behavior:\'smooth\',block:\'start\'})">'+s.head+'</button>'});
    h+='</div>';
  }
  w.sections.forEach(function(s,i){
    h+='<div class="wk-section" id="wk-sec-'+i+'">';
    if(s.head!=='Coming Soon') h+='<div class="wk-section-head"><span class="wk-num">'+s.num+'</span>'+s.head+'</div>';
    s.cards.forEach(function(c){
      h+='<div class="wk-card">';
      if(c.title) h+='<h4>'+c.title+'</h4>';
      h+=c.content;
      h+='</div>';
    });
    h+='</div>';
  });
  h+='</div>';
  h+='<div id="wk-graphs-panel" class="wk-graphs"></div>';
  h+='<div id="wk-formulas-panel" class="wk-quiz"></div>';
  h+='<div id="wk-quiz-panel" class="wk-quiz"></div>';
  el.innerHTML=h;
  el.scrollTop=0;
}

function wkToggle(mode,btn){
  btn.parentElement.querySelectorAll('.wk-mode-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  var notes=document.getElementById('wk-notes-panel');
  var graphs=document.getElementById('wk-graphs-panel');
  var quiz=document.getElementById('wk-quiz-panel');
  var formulas=document.getElementById('wk-formulas-panel');
  if(notes)notes.style.display=mode==='notes'?'':'none';
  if(graphs){graphs.style.display=mode==='graphs'?'block':'none';if(mode==='graphs'){graphs.classList.add('open');renderWeekGraphs(window._currentWeek)}else{graphs.classList.remove('open')}}
  if(formulas){formulas.style.display=mode==='formulas'?'block':'none';if(mode==='formulas'){formulas.classList.add('open');renderWeekFormulas(window._currentWeek)}else{formulas.classList.remove('open')}}
  if(quiz){quiz.style.display=mode==='quiz'?'block':'none';if(mode==='quiz'){quiz.classList.add('open');renderWeekQuiz(window._currentWeek)}else{quiz.classList.remove('open')}}
}

const WEEK_QUIZZES={
week1:[
{type:"concept",q:"List and explain the three functions of money. Evaluate whether Bitcoin satisfies each function.",ctx:"Bitcoin was created in 2009 as a decentralized digital currency with a fixed supply cap of 21 million coins.",
answer:["<b>1. Medium of Exchange:</b> Bitcoin partially satisfies this \u2014 some merchants accept it, and it enables peer-to-peer transfers without intermediaries. However, adoption is limited, transaction processing is slow (~10 min per block), and fees can be high.","<b>2. Unit of Account:</b> Bitcoin FAILS \u2014 virtually no goods or services are priced in Bitcoin. Its extreme price volatility (50%+ swings in months) makes it impractical for quoting prices or recording debts.","<b>3. Store of Value:</b> Bitcoin is a POOR store of value in the short run due to extreme volatility, though it has appreciated enormously over its lifetime. Compare to fiat money which loses value slowly and predictably through inflation.","<b>Conclusion:</b> Bitcoin is NOT money by Mishkin\u2019s functional definition because it fails two of three functions. It is better classified as a speculative asset."],chain:"Money defined by function \u2192 MoE (partial \u2705), UoA (fail \u274c), SoV (fail \u274c) \u2192 Not money by definition",tip:"When evaluating ANY asset as money, always test ALL THREE functions. Credit cards are NOT money either \u2014 they create a loan, not a payment."},
{type:"concept",q:"Distinguish between money, wealth, and income. Give an example showing why the distinction matters for monetary policy.",ctx:"Economists define money precisely, but colloquial usage often confuses these three concepts.",
answer:["<b>Money</b> = a STOCK of assets generally accepted for payment. Includes currency and certain deposits.","<b>Wealth</b> = a STOCK of total property that stores value. Includes money + stocks + bonds + real estate + everything else.","<b>Income</b> = a FLOW of earnings per unit of time (salary per month, GDP per year).","<b>Why it matters:</b> Monetary policy targets the MONEY SUPPLY, not wealth or income. If the Fed doubles M1, it does not double everyone\u2019s wealth (most wealth is in non-money assets like stocks and real estate). A person with $1M in stocks but $500 in their checking account has high wealth but low money holdings."],chain:"Money (liquid stock) \u2260 Wealth (total assets) \u2260 Income (flow per period)",tip:"Exam trick: \u201chow much money do you have?\u201d is ambiguous. It could mean cash on hand, bank balance, net worth, or salary. Each gives a different answer."},
{type:"scenario",q:"The data show countries with higher average money growth rates have higher average inflation rates. Explain the theoretical basis and discuss whether this proves causation.",ctx:"Figure 5 in Mishkin: Russia (17% money growth, 9% inflation), Japan (3%, 0.3%), Indonesia (14%, 5.5%)",
answer:["<b>Theoretical basis \u2014 Quantity Theory of Money:</b> MV = PY.","If velocity (V) is stable and real output (Y) grows at its potential rate, then excess money growth (\u0394M \u2212 \u0394Y) translates directly to inflation (\u0394P).","<b>The cross-country data strongly support this:</b> high-money-growth countries have high inflation, low-money-growth countries have low inflation.","<b>Causation debate:</b> The relationship likely runs BOTH ways:","(1) Money \u2192 Prices: excess money creation finances government spending, increasing demand beyond capacity.","(2) Prices \u2192 Money: in some countries, inflation forces the central bank to increase money supply to accommodate.","(3) Common cause: weak institutions may independently cause both.","<b>Conclusion:</b> Not definitive proof of causation, but the quantity theory provides a strong causal mechanism and the empirical pattern is remarkably consistent."],chain:"\u0394M > \u0394Y \u2192 excess demand \u2192 P\u2191 \u2192 \u03c0\u2191 [Quantity Theory]",tip:"Always mention the key assumptions: V must be stable, Y at potential. The relationship is clearest in LONG-RUN cross-country data. Short-run, V can be volatile."},
{type:"concept",q:"What is the difference between monetary policy and fiscal policy? Who conducts each, and what are the key tools?",ctx:"Both affect the economy but through different mechanisms and institutions.",
answer:["<b>Monetary policy:</b> Management of money supply and interest rates. Conducted by the central bank (Fed in US, BI in Indonesia). Key tools: open market operations, discount rate, reserve requirements.","<b>Fiscal policy:</b> Government spending (G) and taxation (T). Conducted by legislature/government. Key concepts: budget deficit (G > T, must borrow), budget surplus (T > G).","<b>Interaction:</b> Both affect aggregate demand, but through different channels. Monetary policy works through interest rates and money supply; fiscal policy works through direct spending and tax changes.","<b>Important:</b> Any budget deficit must be financed by borrowing (issuing bonds), which can affect interest rates and potentially \u201ccrowd out\u201d private investment."],chain:"Monetary: CB \u2192 i or M \u2192 I, C \u2192 Y. Fiscal: Govt \u2192 G or T \u2192 AD \u2192 Y",tip:"Know the institutional distinction: central bank = monetary, government/legislature = fiscal. They can work together or at cross-purposes."},
],
week2:[
{type:"concept",q:"Compare and contrast direct and indirect finance. Why does indirect finance dominate in most economies?",ctx:"In the U.S. and most countries, intermediaries channel far more funds than securities markets.",
answer:["<b>Direct finance:</b> Borrowers sell securities directly to lenders in financial markets. Requires the borrower to be large and well-known enough for investors to evaluate.","<b>Indirect finance:</b> Intermediaries (banks) accept deposits from savers and make loans to borrowers. The intermediary bears credit risk and monitoring costs.","<b>Why indirect dominates \u2014 three key reasons:</b>","<b>1. Transaction costs:</b> Intermediaries achieve economies of scale \u2014 processing millions of transactions lowers per-unit costs. Individual savers cannot efficiently evaluate and monitor borrowers.","<b>2. Risk sharing:</b> Intermediaries diversify across many borrowers, reducing risk for each depositor. This is \u201casset transformation\u201d \u2014 converting risky loans into safe deposits.","<b>3. Asymmetric information:</b> Intermediaries specialize in screening borrowers (adverse selection) and monitoring them (moral hazard). Individual investors lack this expertise and scale."],chain:"Small savers \u2192 can\u2019t evaluate borrowers efficiently \u2192 intermediaries solve TC + risk + info problems \u2192 efficient capital allocation \u2192 GDP\u2191",tip:"Adverse selection = BEFORE the transaction (screening). Moral hazard = AFTER the transaction (monitoring). TIMING is the key distinction."},
{type:"concept",q:"Explain the difference between money market and capital market instruments. Why are money market instruments considered safer?",ctx:"Tables 1 and 2 in Mishkin Ch. 2 list the principal instruments and their outstanding amounts.",
answer:["<b>Money market:</b> Short-term debt instruments (<1 year maturity). Examples: T-bills, CDs, commercial paper, repos, fed funds. Characterized by short terms, least price fluctuations, lowest risk.","<b>Capital market:</b> Long-term debt and equity instruments (>1 year maturity). Examples: stocks, corporate bonds, mortgages, government bonds. Higher risk but higher potential returns.","<b>Why money market is safer:</b>","(1) Short maturity = less time for adverse events (interest rate changes, default).","(2) Many are government-backed (T-bills = zero default risk).","(3) High liquidity = can sell quickly at fair price.","(4) Low duration = small price sensitivity to interest rate changes."],chain:"Short maturity \u2192 low duration \u2192 small price volatility \u2192 low risk \u2192 money market is safest",tip:"The term \u201cmoney market\u201d is confusing \u2014 it does NOT trade money. It trades SHORT-TERM DEBT. \u201cCapital market\u201d trades LONG-TERM debt and equity."},
{type:"scenario",q:"Explain how adverse selection and moral hazard affect financial markets. How do financial intermediaries help solve these problems?",ctx:"Asymmetric information is central to understanding why the financial system is structured the way it is.",
answer:["<b>Adverse selection (before the transaction):</b> Borrowers who are the worst credit risks are the ones most eager to take out loans. Like the \u201clemons problem\u201d in used car markets \u2014 bad risks drive out good risks. If lenders can\u2019t distinguish good from bad, they charge everyone a high rate \u2192 good borrowers leave \u2192 only bad borrowers remain \u2192 death spiral.","<b>Moral hazard (after the transaction):</b> Once borrowers have funds, they may take excessive risks that increase the probability of default. The lender cannot perfectly observe or control borrower behavior.","<b>How intermediaries solve these:</b>","Adverse selection: Banks invest in credit analysis, require collateral, check financial statements, use credit scores. They specialize in SCREENING borrowers.","Moral hazard: Banks include restrictive covenants in loan contracts, monitor borrower behavior, require borrowers to have \u201cskin in the game\u201d (equity stake).","Both: Economies of scale make it cost-effective for banks to do this for thousands of loans, whereas individual investors cannot."],chain:"Information asymmetry \u2192 adverse selection + moral hazard \u2192 intermediaries screen + monitor \u2192 efficient lending \u2192 GDP\u2191",tip:"FDIC deposit insurance prevents bank runs BUT creates moral hazard for banks (they know depositors are protected \u2192 may take excessive risks). This is the fundamental tension in financial regulation."},
],
week3:[
{type:"concept",q:"Explain monetary aggregates M1 and M2, their components, and why they might give different policy signals.",ctx:"Table 1 in Mishkin shows M1 = $3.56T and M2 = $13.5T as of July 2017.",
answer:["<b>M1 (narrow money):</b> Currency ($1,482B) + Traveler\u2019s checks ($2B) + Demand deposits ($1,502B) + Other checkable deposits ($575B) = $3,560B. These are the most liquid assets.","<b>M2 (broad money):</b> M1 + Small time deposits ($358B) + Savings/MMDA ($8,924B) + Retail MMMF ($674B) = $13,515B. Adds \u201cnear-money\u201d assets.","<b>Why they can diverge:</b> When interest rates change, people shift funds between components:","When rates FALL \u2192 savings less attractive \u2192 shift to checking \u2192 M1\u2191, M2 unchanged.","When rates RISE \u2192 savings more attractive \u2192 shift from checking \u2192 M1\u2193, M2 unchanged.","Financial innovation (sweep accounts) moves funds overnight between categories.","<b>Policy implication:</b> M2 has been more reliable for predicting economic activity. The Fed now targets interest rates rather than monetary aggregates."],chain:"Rate change \u2192 portfolio shift between M1/M2 components \u2192 aggregates diverge \u2192 different policy signals",tip:"Savings/MMDA (~$8.9T) is by far the largest M2 component beyond M1. Credit cards are NOT in any aggregate."},
{type:"scenario",q:"Evaluate the statement: \u201cCredit cards are money.\u201d",ctx:"Many people use credit cards for daily transactions, seemingly functioning as money.",
answer:["<b>Credit cards are NOT money.</b>","<b>What happens when you swipe:</b> The credit card company pays the merchant on your behalf. You now owe the credit card company. No money has been exchanged \u2014 only a debt has been created.","<b>When money IS involved:</b> At month\u2019s end, you pay your credit card bill \u2014 THAT payment involves actual money (transfer from checking deposits/M1).","<b>Test against functions:</b>","MoE: Credit cards FACILITATE exchange but are not the medium \u2014 they create a loan, not a payment.","UoA: Prices are quoted in dollars, not \u201ccredit card units.\u201d","SoV: A credit card balance is a LIABILITY (debt), not an asset.","<b>Contrast with debit cards:</b> Debit cards directly access deposits (which ARE money in M1). The debit card is an access device, not money itself, but the deposits it accesses ARE money."],chain:"Swipe \u2192 short-term loan created (NOT money) \u2192 bill payment with deposits (IS money) \u2192 loan repaid",tip:"This is a classic exam trick. Credit cards \u2260 money. Debit cards access money. Checks are instructions to transfer money. Only currency and deposits ARE money."},
{type:"concept",q:"Trace the evolution of the payments system from commodity money to e-money. What are the advantages and disadvantages of each stage?",ctx:"Mishkin describes five stages of payment system evolution.",
answer:["<b>1. Commodity money:</b> Precious metals, cigarettes. \u2705 Intrinsic value, standardized. \u274c Heavy, hard to transport, quantity limited by physical supply.","<b>2. Fiat money:</b> Government-decreed paper currency. \u2705 Lightweight, easy to produce. \u274c No intrinsic value, depends on government credibility, can be counterfeited.","<b>3. Checks:</b> Instructions to transfer bank deposits. \u2705 Exact amounts, safer than carrying cash, creates paper trail. \u274c Slow processing (days to clear), can bounce.","<b>4. Electronic payment:</b> Online transfers, direct deposit. \u2705 Fast, cheap, convenient. \u274c Requires technology infrastructure, cybersecurity risks.","<b>5. E-money:</b> Debit cards, stored-value cards, e-cash. \u2705 Instantaneous, works globally. \u274c Privacy concerns, system failure risk, challenges for monetary policy.","<b>Key pattern:</b> Each stage reduces transaction costs and increases speed, but also raises new questions about regulation and central bank control."],chain:"Commodity \u2192 Fiat \u2192 Checks \u2192 Electronic \u2192 E-money: each step \u2193 transaction costs, \u2191 speed, \u2191 new challenges",tip:"For Bitcoin: the innovation is decentralization (no central authority). But this is also its weakness \u2014 no lender of last resort, no regulatory oversight, no price stability mechanism."},
],
week4:[
{type:"concept",q:"Explain why yield to maturity is considered the most accurate measure of interest rates. How does it differ from the coupon rate and current yield?",ctx:"Chapter 4 presents YTM as the preferred interest rate measure across all four types of credit market instruments.",
answer:["<b>Yield to maturity (YTM)</b> is the interest rate that equates the present value of ALL future cash flows from a debt instrument with its value today. It accounts for the time value of money across the entire life of the instrument.","<b>Coupon rate</b> is simply C/F (annual coupon divided by face value). It is FIXED when the bond is issued and does NOT change. It tells you nothing about the return you\u2019ll earn at the current market price.","<b>Current yield</b> is C/P (annual coupon divided by current price). It\u2019s easy to calculate but ignores capital gains/losses and the time to maturity.","<b>YTM is superior</b> because it incorporates: (1) all coupon payments, (2) the face value repayment, (3) the current market price, and (4) the time to maturity. It\u2019s the single rate that makes the PV equation balance.","Key relationship: When P = F, YTM = coupon rate = current yield. When P < F (discount), YTM > coupon rate > current yield. When P > F (premium), YTM < coupon rate < current yield."],chain:"P\u2193 \u2192 YTM\u2191 (inverse), P=F \u2192 YTM=coupon rate, P<F \u2192 YTM>coupon rate",tip:"On exams, always check: are they asking for YTM (solve the PV equation), coupon rate (C/F, fixed), or current yield (C/P, approximation)? They are DIFFERENT numbers unless the bond trades at par."},
{type:"quant",q:"A 10%-coupon bond with face value $1,000 and 10 years to maturity is currently trading at $800. Is the YTM above or below 10%? What happens to the bond\u2019s price if market interest rates rise to 20%?",ctx:"Table 1 in Mishkin shows the inverse relationship between price and YTM for this bond.",
answer:["<b>Part 1:</b> Since P ($800) < F ($1,000), the YTM must be ABOVE the coupon rate (10%). From the table, at P=$800 the YTM is 13.81%.","<b>Intuition:</b> You buy for $800 but receive $100/year in coupons PLUS $1,000 at maturity. The $200 capital gain spread over 10 years adds to your return beyond the coupon alone.","<b>Part 2:</b> If rates rise to 20%, the price falls dramatically. From the table: at YTM=20%, the 10-year bond price drops to about $597.","<b>Why such a large drop?</b> All future cash flows (10 years of $100 coupons + $1,000 face) are now discounted at 20% instead of 13.81%. The higher discount rate crushes the present value of distant payments.","<b>Rate of return:</b> Current yield = 10% but capital loss = (597\u2212800)/800 = \u221225.4%. Total return = 10% + (\u221225.4%) = \u221215.4%. Even with a 10% coupon, the holder loses money!"],chain:"P<F \u2192 YTM>coupon \u2192 rates\u2191 \u2192 P\u2193\u2193 \u2192 capital loss > coupon income \u2192 negative return",tip:"Longer maturity = greater price sensitivity. A 30-year bond at the same 10\u219220% rate shock would drop to ~$503 (\u221249.7% capital loss!). This is interest-rate risk."},
{type:"concept",q:"Distinguish between nominal and real interest rates using the Fisher equation. Why is the real rate a better guide for economic decisions?",ctx:"The Fisher equation i = i\u1d63 + \u03c0\u1d49 is one of the most important relationships in monetary economics.",
answer:["<b>Nominal interest rate (i):</b> The stated rate with no adjustment for inflation. This is what you see quoted in the newspaper or on your bank statement.","<b>Real interest rate (i\u1d63):</b> Adjusted for expected inflation: i\u1d63 = i \u2212 \u03c0\u1d49. Measures the true cost of borrowing in terms of purchasing power.","<b>Example:</b> If nominal rate = 8% and expected inflation = 5%, real rate = 3%. If inflation rises to 8%, real rate = 0% \u2014 borrowing is essentially FREE in real terms despite the \u201chigh\u201d nominal rate.","<b>Why real rate matters more:</b> A firm deciding whether to invest compares the expected real return on the project against the real borrowing cost. If both are in nominal terms, inflation cancels out. What matters is the REAL spread.","<b>Ex ante vs ex post:</b> Ex ante uses EXPECTED inflation (decision-relevant). Ex post uses ACTUAL inflation (for historical analysis). They differ because inflation expectations aren\u2019t always accurate.","<b>Negative real rates:</b> When i < \u03c0, i\u1d63 < 0. This happened in the 1970s (high inflation exceeded nominal rates) and again in 2009\u20132015 (near-zero nominal rates with positive inflation). Negative real rates strongly incentivize borrowing."],chain:"Low real rate \u2192 cheap borrowing \u2192 investment\u2191 \u2192 consumption\u2191 \u2192 AD\u2191",tip:"Always compute the REAL rate before analyzing economic incentives. A 20% nominal rate with 18% inflation is LESS restrictive than a 5% nominal rate with 1% inflation."},
],
week5:[
{type:"concept",q:"Using the theory of portfolio choice, explain how an increase in expected inflation affects the demand for bonds and the equilibrium interest rate.",ctx:"Chapter 5\u2019s bond market framework (loanable funds) analyzes how shifts in demand and supply determine interest rates.",
answer:["<b>Step 1 \u2014 Demand for bonds:</b> Higher expected inflation lowers the expected REAL return on bonds (which pay fixed nominal amounts). By the theory of portfolio choice, a decrease in expected return relative to other assets reduces quantity demanded at every price. Bond demand curve shifts LEFT.","<b>Step 2 \u2014 Supply of bonds:</b> Higher expected inflation makes it cheaper to repay debt in real terms. Borrowers want to borrow more at every price. Bond supply curve shifts RIGHT.","<b>Step 3 \u2014 New equilibrium:</b> Both shifts push bond prices DOWN (demand left + supply right = lower P). Since P and i are inversely related, the equilibrium interest rate RISES.","<b>This is the Fisher Effect:</b> A 1% increase in expected inflation leads to roughly a 1% increase in nominal interest rates, consistent with the Fisher equation i = i\u1d63 + \u03c0\u1d49.","<b>Empirical support:</b> From 1953\u20132017, expected inflation and 3-month T-bill rates have moved closely together, strongly confirming this theory."],chain:"\u03c0\u1d49\u2191 \u2192 bond demand\u2190 + bond supply\u2192 \u2192 P\u2193 \u2192 i\u2191 [Fisher Effect]",tip:"Expected inflation shifts BOTH curves: demand LEFT (lower real return) and supply RIGHT (cheaper to borrow). Both movements reinforce higher interest rates. This double-shift is a favorite exam question."},
{type:"scenario",q:"The central bank increases the money supply. Using the liquidity preference framework, explain the immediate effect on interest rates. Then discuss why the long-run effect might be different.",ctx:"Figure 10 in Mishkin shows the immediate response; Figure 11 shows the time path under three scenarios.",
answer:["<b>Immediate (Liquidity Effect):</b> Money supply curve shifts RIGHT (M\u02e2\u2081 \u2192 M\u02e2\u2082). At the old interest rate, there is now excess money supply. People buy bonds with excess money \u2192 bond prices rise \u2192 interest rate FALLS from i\u2081 to i\u2082.","<b>Medium-run effects pushing rates back UP:</b>","(1) <b>Income effect:</b> Lower rates stimulate investment and consumption \u2192 Y\u2191 \u2192 money demand shifts RIGHT \u2192 i\u2191.","(2) <b>Price-level effect:</b> Higher Y and more money leads to P\u2191 \u2192 people need more nominal money for transactions \u2192 M\u1d48 shifts RIGHT \u2192 i\u2191. This effect is PERMANENT.","(3) <b>Expected-inflation effect:</b> If people expect M\u2191 to cause \u03c0\u2191, they demand higher nominal rates via Fisher effect \u2192 i\u2191. This operates as long as P continues rising.","<b>Net result depends on magnitudes:</b> If liquidity effect dominates, rates stay lower. If other effects dominate (especially expected inflation), rates may end up HIGHER than before the money supply increase!"],chain:"M\u2191 \u2192 i\u2193 (liquidity) \u2192 then Y\u2191 + P\u2191 + \u03c0\u1d49\u2191 \u2192 i\u2191 (income + price-level + expected-inflation effects)",tip:"The key insight: more money does NOT necessarily mean lower interest rates in the long run. If expected-inflation effect adjusts quickly and dominates, rates can rise immediately. This is why M2 growth and T-bill rates are positively correlated in the long run."},
{type:"diagram",q:"Draw and explain the bond market response to a business cycle expansion. Which curve shifts more, and why?",ctx:"Figure 6 in Mishkin shows both supply and demand shifting rightward during an expansion.",
answer:["<b>Step 1:</b> During an expansion, profitable investment opportunities increase \u2192 firms borrow more \u2192 bond SUPPLY shifts RIGHT (dominant effect).","<b>Step 2:</b> Rising income increases wealth \u2192 bond DEMAND also shifts RIGHT, but by a LESSER amount than supply.","<b>Step 3:</b> Net effect: bond price FALLS \u2192 interest rate RISES.","<b>Why supply shifts more:</b> In a boom, firms\u2019 borrowing needs (driven by investment opportunities) expand faster than households\u2019 additional saving from higher income. Businesses are aggressively expanding capacity, while households increase consumption along with savings.","<b>Empirical evidence:</b> Figure 7 (1951\u20132017) confirms that interest rates (3-month T-bills) consistently rise during expansions and fall during recessions."],chain:"Expansion \u2192 investment opportunities\u2191 \u2192 B\u02e2 shifts right (>B\u1d48 shift) \u2192 P\u2193 \u2192 i\u2191",tip:"On a diagram: draw BOTH curves shifting right, but the supply shift is LARGER. The new equilibrium has a lower P and higher i. Always label clearly: initial (point 1) and final (point 2) equilibria."},
{type:"concept",q:"List the four determinants of asset demand from the theory of portfolio choice. For each, explain the direction of the relationship and give a real-world example involving bonds.",ctx:"This is the foundation for understanding why bond demand shifts. Summary Table 1 in Mishkin.",
answer:["<b>1. Wealth (+):</b> As total resources increase, people demand more of all assets, including bonds. Example: during an economic expansion, rising incomes increase household savings, shifting bond demand RIGHT.","<b>2. Expected return (+, relative):</b> An asset\u2019s attractiveness depends on its return RELATIVE to alternatives. Example: if stock market expected returns rise (tech boom), bonds become relatively less attractive \u2192 bond demand falls. Conversely, if expected inflation rises, bond real returns fall \u2192 bond demand LEFT.","<b>3. Risk (\u2212, relative):</b> Higher risk reduces demand. Example: during a financial crisis, corporate bond risk increases \u2192 demand shifts LEFT. Simultaneously, Treasury bond risk is unchanged \u2192 demand shifts RIGHT (flight to quality).","<b>4. Liquidity (+, relative):</b> Easier to sell = more desirable. Example: Treasury bonds are traded in deep, liquid markets. If a new electronic trading platform makes corporate bonds more liquid, their demand increases (demand shifts RIGHT)."],chain:"Demand = f(Wealth +, Expected Return +, Risk \u2212, Liquidity +)",tip:"ALL FOUR factors are assessed RELATIVE to alternative assets. This is not just about the asset in isolation \u2014 it\u2019s about the asset compared to what else you could hold. A common exam trick: \u201cWhat happens to bond demand if the stock market becomes riskier?\u201d Answer: bonds become relatively LESS risky \u2192 bond demand shifts RIGHT."},
{type:"concept",q:"Explain the difference between the loanable funds framework (bond market) and the liquidity preference framework (money market). Why do they give the same answer?",ctx:"Both frameworks determine the equilibrium interest rate but from different angles. Walras\u2019 Law connects them.",
answer:["<b>Loanable funds (bond market):</b> Equilibrium determined by bond supply (borrowers) and bond demand (lenders). The interest rate is the \u201cprice\u201d of borrowing. Graphs plot bond price (P) vs quantity (B), with i on a secondary axis.","<b>Liquidity preference (money market):</b> Equilibrium determined by money supply (Fed sets M\u02e2, vertical) and money demand (opportunity cost of holding money, downward-sloping). Graphs plot interest rate (i) vs quantity of money (M).","<b>Why they give the same answer \u2014 Walras\u2019 Law:</b>","Total wealth = B\u02e2 + M\u02e2 = B\u1d48 + M\u1d48","Rearranging: B\u02e2 \u2212 B\u1d48 = M\u1d48 \u2212 M\u02e2","If the money market clears (M\u02e2 = M\u1d48), then automatically B\u02e2 = B\u1d48 (bond market clears too).","<b>When to use which:</b> Loanable funds is better for analyzing fiscal policy and the Fisher effect (\u03c0\u1d49 changes). Liquidity preference is better for analyzing monetary policy (M\u02e2 changes)."],chain:"Bond market: B\u1d48=B\u02e2 \u2194 Money market: M\u02e2=M\u1d48 (Walras\u2019 Law)",tip:"If an exam asks you to analyze a monetary policy change, use liquidity preference. If it asks about inflation expectations or government deficits, use loanable funds. Both are correct \u2014 pick the one that makes the analysis cleanest."},
{type:"quant",q:"A one-year discount bond has a face value of $1,000. (a) If the bond price is $950, what is the yield to maturity? (b) The government announces a large deficit and will issue many new bonds. Using the bond market S&D framework, predict what happens to the bond price and interest rate.",ctx:"Use i = (F\u2212P)/P for the discount bond, and bond supply shift analysis.",
answer:["<b>(a) YTM calculation:</b>","i = (F \u2212 P) / P = (1000 \u2212 950) / 950 = 50/950 = <b>5.26%</b>","<b>(b) Government deficit analysis:</b>","Government must finance the deficit by issuing bonds \u2192 bond supply shifts RIGHT.","Bond demand is unchanged (no change in wealth, expected returns, risk, or liquidity).","At the old price, there is now excess supply of bonds.","Sellers must cut prices to attract buyers.","Result: bond price FALLS and interest rate RISES.","This is the <b>crowding out</b> mechanism \u2014 government borrowing pushes up rates, making it more expensive for private firms to borrow."],chain:"Deficit\u2191 \u2192 B\u02e2 shifts right \u2192 P\u2193 \u2192 i\u2191 [crowding out]",tip:"At the new equilibrium, verify: lower P means higher i using the formula. If P drops from $950 to $900: i = (1000\u2212900)/900 = 11.1%. The rate more than doubled from a $50 price drop!"},
],
week6:[
{type:"concept",q:"Explain the three factors that make up the risk structure of interest rates. Use the 2007\u20132009 financial crisis as an example.",ctx:"Figure 1 shows how Baa, Aaa, Treasury, and municipal yields have moved from 1919\u20132017.",
answer:["<b>1. Default risk:</b> The probability the issuer cannot pay. Higher default risk \u2192 higher risk premium \u2192 higher yield. U.S. Treasuries are default-free; corporate bonds carry default risk. Rating agencies (Moody\u2019s, S&P, Fitch) grade bonds from Aaa/AAA (safest) to C/D (default).","<b>2. Liquidity:</b> How easily a bond can be sold. Treasury bonds are the MOST liquid (deep markets, many traders). Corporate bonds are less liquid \u2192 investors demand a liquidity premium.","<b>3. Tax considerations:</b> Municipal bond interest is exempt from federal income taxes. This makes munis attractive to high-income investors, pushing muni yields BELOW Treasury yields despite higher default risk.","<b>2007\u20132009 crisis example:</b> The subprime mortgage collapse made investors doubt corporate solvency. Baa bond demand shifted LEFT (higher perceived default risk). Treasury demand shifted RIGHT (flight to quality/safety). Result: Baa yields spiked, Treasury yields fell \u2192 the Baa\u2013Treasury spread widened dramatically from ~180bps to over 600bps."],chain:"Default risk\u2191 \u2192 corporate demand\u2190 + Treasury demand\u2192 \u2192 spread widens (flight to quality)",tip:"Risk premium = yield on risky bond MINUS yield on same-maturity Treasury. Watch for exam questions combining ALL THREE factors: a bond can have high default risk + low liquidity + unfavorable tax treatment = very high yield."},
{type:"concept",q:"Compare the expectations theory, segmented markets theory, and liquidity premium theory of the term structure. Which facts does each explain?",ctx:"Three empirical facts: (1) rates co-move across maturities, (2) low short rates \u2192 upward slope, high short rates \u2192 inverted, (3) yield curves usually slope upward.",
answer:["<b>Expectations Theory:</b> Long rate = average of expected short rates. Bonds are PERFECT substitutes. \u2705 Explains fact 1 (if one short rate rises, the average rises \u2192 long rates rise too). \u2705 Explains fact 2 (low short rates \u2192 expected to rise \u2192 average > current \u2192 upward slope). \u274c Fails fact 3 (would require perpetual expectation of rising rates).","<b>Segmented Markets Theory:</b> Bonds of different maturities are NOT substitutes. Each maturity has its own supply/demand. Investors prefer short bonds (less risk). \u2705 Explains fact 3 (preference for short bonds \u2192 lower short yields \u2192 upward slope). \u274c Fails facts 1 and 2 (no mechanism linking maturities).","<b>Liquidity Premium Theory:</b> Long rate = average of expected short rates + liquidity premium (l\u2099\u209c > 0, increasing in n). Bonds are PARTIAL substitutes. \u2705 Explains ALL three facts.","Fact 1: first term (expected rate average) creates co-movement.","Fact 2: low i\u209c \u2192 expect i to rise \u2192 upward average + premium = steep upward slope. High i\u209c \u2192 expect i to fall \u2192 falling average can overcome premium = inverted.","Fact 3: positive premium biases curve upward even when expected rates are unchanged."],chain:"i\u2099\u209c = avg(expected short rates) + l\u2099\u209c where l\u2099\u209c > 0, \u2191 with n",tip:"The liquidity premium theory is the MOST COMPLETE theory. For exam questions asking you to interpret a yield curve shape: steep upward = rates expected to rise; flat = rates expected to fall moderately (premium offsets); inverted = rates expected to fall sharply (overcoming the premium). An inverted curve is a famous recession predictor!"},
{type:"quant",q:"One-year interest rates over the next five years are expected to be 5%, 6%, 7%, 8%, and 9%. Calculate the interest rate on a 5-year bond using (a) the expectations theory and (b) the liquidity premium theory with a premium of 0.5%.",ctx:"This is a direct application of the term structure formulas from Chapter 6.",
answer:["<b>(a) Expectations Theory:</b>","i\u2085\u209c = (i\u209c + i\u1d49\u209c\u208a\u2081 + i\u1d49\u209c\u208a\u2082 + i\u1d49\u209c\u208a\u2083 + i\u1d49\u209c\u208a\u2084) / 5","i\u2085\u209c = (5% + 6% + 7% + 8% + 9%) / 5 = 35% / 5 = <b>7.0%</b>","<b>(b) Liquidity Premium Theory:</b>","i\u2085\u209c = 7.0% + l\u2085\u209c = 7.0% + 0.5% = <b>7.5%</b>","<b>Interpretation:</b> The expectations theory predicts a 7% five-year rate. The liquidity premium theory adds 0.5% for the extra risk of holding a long-term bond, giving 7.5%. In practice, this premium compensates investors for the greater interest-rate risk (price volatility) of long-term bonds."],chain:"Expected short rates: 5,6,7,8,9 \u2192 avg=7% \u2192 +0.5% premium = 7.5%",tip:"Always compute the simple average FIRST (expectations component), then ADD the premium. The premium is always positive and increases with maturity. If the question asks for a 2-year rate: i\u2082\u209c = (5+6)/2 + l\u2082\u209c."},
],
week7:[
{type:"concept",q:"Using the Gordon Growth Model, explain how the 2007\u20132009 financial crisis caused stock prices to plummet. Which variables in the model changed and in which direction?",ctx:"The crisis began with subprime mortgage defaults and spread to the broader economy. The S&P 500 dropped about 57% from its October 2007 peak to its March 2009 trough.",
answer:["<b>The Gordon Growth Model:</b> P\u2080 = D\u2081 / (k\u2091 \u2212 g)","<b>Variable 1 \u2014 Growth expectations (g) fell:</b> The financial crisis triggered a severe recession. Corporate earnings collapsed, and analysts slashed growth forecasts. Lower g reduces the denominator but also reduces the expected dividend path, both pushing P\u2080 down.","<b>Variable 2 \u2014 Required return (k\u2091) rose:</b> Uncertainty and perceived risk skyrocketed. Credit markets froze, counterparty risk surged, and VIX spiked to historic highs. Investors demanded higher compensation for risk \u2192 k\u2091\u2191.","<b>Combined effect on P\u2080:</b> The denominator (k\u2091 \u2212 g) widened from BOTH directions: k\u2091 rising and g falling. A larger denominator means a dramatically lower P\u2080.","<b>Numerical intuition:</b> If before crisis D\u2081=$2, k\u2091=10%, g=5%, then P\u2080 = 2/(0.10\u22120.05) = $40. If during crisis k\u2091 rises to 14% and g falls to 2%: P\u2080 = 2/(0.14\u22120.02) = $16.67 \u2014 a 58% drop."],chain:"Crisis \u2192 g\u2193 + k\u2091\u2191 \u2192 (k\u2091 \u2212 g)\u2191 \u2192 P\u2080\u2193\u2193 [Gordon model predicts sharp crash]",tip:"This is the #1 application of the Gordon model on exams. Remember: BOTH g and k\u2091 changed simultaneously and REINFORCED each other, making the crash particularly severe."},
{type:"concept",q:"Distinguish between adaptive expectations and rational expectations. Why is the rational expectations theory particularly relevant for financial markets?",ctx:"The theory of rational expectations was developed by John Muth in 1961 and later applied extensively by Robert Lucas.",
answer:["<b>Adaptive expectations:</b> Expectations are formed from PAST data only. They adjust slowly as new data arrives. Limitation: ignores current information, policy announcements, and forward-looking indicators.","<b>Rational expectations:</b> Expectations = optimal forecast using ALL available information (X\u1d49 = X\u1d52\u1da0). This includes past data PLUS current conditions, policy announcements, economic models, and any other relevant information.","<b>Key properties of rational expectations:</b>","(1) Expectations change QUICKLY when new information arrives (not slowly like adaptive).","(2) Forecast errors are ZERO on average and cannot be predicted.","(3) If the underlying process changes (e.g., new monetary policy regime), expectations adjust immediately.","<b>Why particularly relevant for financial markets:</b> The incentives to have good forecasts are strongest in financial markets because people with better predictions earn higher returns. Those with systematically biased forecasts lose money and exit the market. This Darwinian selection makes rational expectations a natural fit for financial market analysis."],chain:"Financial markets: strong profit incentive \u2192 eliminate systematic forecast errors \u2192 R\u1d49 = R\u1d52\u1da0 \u2192 EMH",tip:"Rational expectations \u2260 perfect foresight. People can still be WRONG \u2014 but they won\u2019t be wrong in a PREDICTABLE or SYSTEMATIC way. Random errors are fine; biased errors are not."},
{type:"concept",q:"State the Efficient Market Hypothesis (EMH). Explain the arbitrage mechanism that drives R\u1d52\u1da0 to equal R*. What are the practical implications for individual investors?",ctx:"The EMH is the application of rational expectations theory to financial markets.",
answer:["<b>Statement:</b> In an efficient market, the optimal forecast of a security\u2019s return (R\u1d52\u1da0) using all available information equals the security\u2019s equilibrium return (R*). Equivalently, a security\u2019s price fully reflects all available information.","<b>Arbitrage mechanism:</b>","If R\u1d52\u1da0 > R* (security offers above-normal returns): investors rush to buy \u2192 demand\u2191 \u2192 P\u209c\u2191 \u2192 R\u1d52\u1da0\u2193 (higher price means lower expected return going forward).","If R\u1d52\u1da0 < R* (security offers below-normal returns): investors sell \u2192 supply\u2191 \u2192 P\u209c\u2193 \u2192 R\u1d52\u1da0\u2191 (lower price means higher expected return going forward).","This continues until R\u1d52\u1da0 = R* \u2014 all unexploited profit opportunities are eliminated.","<b>Practical implications:</b>","(1) Published investment advice is already priced in \u2192 acting on it yields no abnormal returns.","(2) Hot tips are likely already reflected in prices.","(3) Prices respond only to NEW, UNEXPECTED information.","(4) A buy-and-hold index strategy is optimal for most investors."],chain:"R\u1d52\u1da0 \u2260 R* \u2192 buy/sell pressure \u2192 P adjusts \u2192 R\u1d52\u1da0 converges to R* \u2192 no free lunch",tip:"The EMH does NOT say you can\u2019t earn positive returns. You earn R* (the equilibrium return). It says you can\u2019t earn ABOVE R* consistently using public information. The distinction between earning returns and earning ABNORMAL returns is key."},
{type:"scenario",q:"A company just paid a dividend of $3.00. Dividends are expected to grow at 4% per year. The required return on equity is 12%. (a) Calculate the stock price. (b) What happens to the price if the growth rate drops to 2% due to a recession? (c) What happens if risk increases and k\u2091 rises to 15%?",ctx:"Use the Gordon Growth Model: P\u2080 = D\u2080(1+g) / (k\u2091 \u2212 g).",
answer:["<b>(a) Base case:</b>","P\u2080 = D\u2080(1+g) / (k\u2091 \u2212 g) = 3.00(1.04) / (0.12 \u2212 0.04) = 3.12 / 0.08 = <b>$39.00</b>","<b>(b) Growth drops to 2%:</b>","P\u2080 = 3.00(1.02) / (0.12 \u2212 0.02) = 3.06 / 0.10 = <b>$30.60</b>","Change: $30.60 \u2212 $39.00 = \u2212$8.40 (\u221221.5%)","<b>(c) k\u2091 rises to 15% (with original g=4%):</b>","P\u2080 = 3.00(1.04) / (0.15 \u2212 0.04) = 3.12 / 0.11 = <b>$28.36</b>","Change: $28.36 \u2212 $39.00 = \u2212$10.64 (\u221227.3%)","<b>Key insight:</b> Changes in the required return k\u2091 have a LARGER impact than changes in g. This is because k\u2091 directly affects the discount rate applied to ALL future dividends, while g affects the growth rate but the level impact depends on the gap (k\u2091\u2212g)."],chain:"g\u2193 or k\u2091\u2191 \u2192 (k\u2091\u2212g)\u2191 \u2192 P\u2080\u2193",tip:"Always check: is k\u2091 > g? If not, the Gordon model breaks down (negative or infinite price). In this problem: 12% > 4% \u2705, 12% > 2% \u2705, 15% > 4% \u2705."},
],
};

var WEEK_FORMULAS={
week1:[
{title:"Quantity Theory of Money",formula:"MV = PY",explain:"M = money supply, V = velocity of money, P = price level, Y = real output (GDP). If V is stable and Y grows at potential, then excess money growth translates directly to inflation: %\u0394P \u2248 %\u0394M \u2212 %\u0394Y. This is the fundamental long-run link between money and prices.",example:"If M grows 10%, Y grows 3%, V is stable \u2192 inflation \u2248 7%"},
{title:"GDP (Expenditure Approach)",formula:"GDP = C + I + G + (EX \u2212 IM)",explain:"C = consumption, I = investment, G = government spending, EX = exports, IM = imports. This identity says total spending equals total output. Each component has behavioral drivers studied in monetary economics.",example:"US GDP ~$19T: C (~68%) + I (~18%) + G (~17%) + NX (~\u22123%)"},
{title:"Inflation Rate",formula:"\u03c0 = (P\u209c \u2212 P\u209c\u208b\u2081) / P\u209c\u208b\u2081 \u00d7 100",explain:"The percentage change in the price level from one period to the next. Measures how quickly the purchasing power of money is eroding. The Fed targets ~2% inflation using the PCE deflator.",example:"If price level rises from 100 to 103 \u2192 \u03c0 = 3%"},
{title:"GDP Deflator",formula:"GDP Deflator = (Nominal GDP / Real GDP) \u00d7 100",explain:"Converts nominal to real by stripping out price changes. Real GDP isolates actual production changes. The deflator itself is a price index covering ALL domestically produced goods.",example:"Nominal GDP = $21T, Real GDP = $19T \u2192 Deflator = 110.5 (prices 10.5% above base year)"},
{title:"Fisher Equation",formula:"i = r + \u03c0\u1d49",explain:"Nominal interest rate (i) = real interest rate (r) + expected inflation (\u03c0\u1d49). The real rate is what matters for economic decisions because it adjusts for purchasing power. If nominal rate is 8% and expected inflation is 3%, the real cost of borrowing is only 5%.",example:"i = 8%, \u03c0\u1d49 = 3% \u2192 r = 5%. The borrower really pays 5% in purchasing-power terms."},
],
week2:[
{title:"Present Discount Value (PDV)",formula:"PDV = FV / (1 + i)\u207f",explain:"The value TODAY of a payment received n periods in the future, discounted at interest rate i. Foundation of ALL asset pricing. Higher i \u2192 lower PDV. This is why interest rates affect every asset price in the economy.",example:"$1,000 in 2 years at 5%: PDV = 1000/(1.05)\u00b2 = $907.03"},
{title:"Bond Pricing (Zero Coupon)",formula:"P\u1d47 = Face / (1 + i)\u207f",explain:"Bond price equals the face value discounted back at the yield. Price and yield are INVERSELY related \u2014 always. When the Fed buys bonds (QE), prices rise and yields fall.",example:"$1,000 face, 2 years, yield 5%: P = 1000/(1.05)\u00b2 = $907.03"},
{title:"Bond Yield (from price)",formula:"i = (Face / P\u1d47)^(1/n) \u2212 1",explain:"Given a bond\u2019s market price and face value, solve for the yield. This is the return the investor earns if they hold to maturity.",example:"P = $800, Face = $1,000, n = 2: i = (1000/800)^0.5 \u2212 1 = 11.8%"},
{title:"Coupon Bond Price",formula:"P = \u2211 C/(1+i)\u1d57 + Face/(1+i)\u207f",explain:"For bonds paying regular coupons (C), the price is the sum of discounted coupon payments plus the discounted face value at maturity. Longer maturity = more sensitive to rate changes (higher duration).",example:"$1,000 face, 5% coupon, 3 years, yield 4%: P = 50/1.04 + 50/1.04\u00b2 + 1050/1.04\u00b3 = $1,027.75"},
{title:"Money Multiplier",formula:"m = 1 / rr  (simple)\nm = (1+c) / (c+rr)  (with currency drain)",explain:"rr = reserve requirement ratio, c = currency-to-deposit ratio. Each dollar of monetary base creates m dollars of deposits through the bank lending cycle. Lower rr or lower c \u2192 higher multiplier \u2192 more money creation.",example:"rr = 10%, c = 0: m = 1/0.10 = 10. Each $1 of reserves creates $10 of deposits.\nWith c = 0.4: m = 1.4/0.5 = 2.8"},
],
week3:[
{title:"Transaction Cost Savings from Money",formula:"Barter: N(N\u22121)/2 prices\nMoney: N\u22121 prices",explain:"With N goods, barter requires N(N\u22121)/2 bilateral exchange rates. Money reduces this to N\u22121 money prices. The savings grow QUADRATICALLY with N, which is why money becomes more valuable as economies become more complex.",example:"100 goods: Barter = 4,950 rates. Money = 99 prices. \nSavings = 4,851 fewer prices to track (98% reduction!)"},
{title:"M1 Definition",formula:"M1 = Currency + Traveler\u2019s checks + Demand deposits + Other checkable deposits",explain:"The narrowest monetary aggregate. Includes only assets that can be directly used as a medium of exchange \u2014 immediately spendable without conversion. Currency is the most liquid; checkable deposits can be spent via check, debit card, or electronic transfer.",example:"M1 (July 2017): $1,482B + $2B + $1,502B + $575B = $3,560B"},
{title:"M2 Definition",formula:"M2 = M1 + Small time deposits + Savings & MMDA + Retail MMMF shares",explain:"The broader monetary aggregate. Adds near-money assets \u2014 not directly spendable but quickly convertible. Savings/MMDA is the dominant component ($8.9T). M2 is a better predictor of economic activity than M1.",example:"M2 (July 2017): $3,560B + $358B + $8,924B + $674B = $13,515B"},
{title:"Opportunity Cost of Holding Money",formula:"Opportunity cost = i (the interest rate)",explain:"By holding money (which earns zero or low return), you give up the interest you could earn on bonds or other assets. Higher i \u2192 higher opportunity cost \u2192 hold less money \u2192 money demand decreases. This is the foundation of the money demand function: M\u1d48 = L(Y, i) where \u2202M\u1d48/\u2202i < 0.",example:"If bonds pay 5% and cash pays 0%, holding $10,000 in cash costs $500/year in foregone interest."},
{title:"Velocity of Money",formula:"V = PY / M  (from MV = PY)",explain:"How many times per year each dollar is used for transactions. If V is stable, changes in M translate to changes in PY (nominal GDP). The instability of V since the 1980s is why the Fed stopped targeting monetary aggregates.",example:"If GDP = $20T and M2 = $13.5T: V = 20/13.5 \u2248 1.48 (each dollar used ~1.5 times per year)"},
],
week4:[
{title:"Present Value",formula:"PV = CF / (1 + i)\u207f",explain:"The value today of a future cash flow CF received n periods from now, discounted at interest rate i. Higher i or higher n means lower PV. This is the foundation of ALL bond pricing and investment decisions.",example:"PV of $1,000 in 3 years at 10%: PV = 1000/(1.10)\u00b3 = $751.31"},
{title:"Yield to Maturity (Simple Loan)",formula:"i = (CF \u2212 PV) / PV = (CF/PV) \u2212 1",explain:"For a simple loan, the YTM equals the simple interest rate. The rate that equates today\u2019s loan value with the present value of repayment.",example:"Lend $100, receive $110 in 1 year: i = (110\u2212100)/100 = 10%"},
{title:"Fixed-Payment Loan YTM",formula:"LV = FP/(1+i) + FP/(1+i)\u00b2 + ... + FP/(1+i)\u207f",explain:"LV = loan value, FP = fixed yearly payment, n = years. Solve for i numerically. This is the annuity present value formula \u2014 used for mortgages and car loans.",example:"$100,000 mortgage, $7,451/yr for 20 years \u2192 solve for i (requires financial calculator)"},
{title:"Coupon Bond Price",formula:"P = C/(1+i) + C/(1+i)\u00b2 + ... + C/(1+i)\u207f + F/(1+i)\u207f",explain:"P = price, C = annual coupon, F = face value, n = years to maturity, i = YTM. When P=F, YTM=coupon rate. P and i are ALWAYS inversely related.",example:"$1,000 face, 10% coupon, 10yr. At YTM=10%: P=$1,000. At YTM=20%: P=$597"},
{title:"Current Yield (Consol)",formula:"i\u1d9c = C / P",explain:"Annual coupon divided by current price. For consols/perpetuities, this IS the YTM. For coupon bonds, it\u2019s an approximation that improves as maturity lengthens or as price nears par.",example:"Bond with $100 coupon trading at $950: i\u1d9c = 100/950 = 10.53%"},
{title:"Discount Bond YTM",formula:"i = (F \u2212 P) / P",explain:"For a one-year discount bond. The return equals the price appreciation divided by the purchase price. No coupon payments.",example:"T-bill: Face=$1,000, Price=$950: i = (1000\u2212950)/950 = 5.26%"},
{title:"Rate of Return",formula:"RET = C/P\u209c + (P\u209c\u208a\u2081 \u2212 P\u209c)/P\u209c = i\u1d9c + g",explain:"Return = current yield + capital gain rate. Return equals YTM only if holding period = maturity. Rising rates cause capital losses (g < 0) for bonds held before maturity.",example:"Buy at $1,000 (10% coupon). Rates rise to 20%, price drops to $503. RET = 10% + (\u221249.7%) = \u221239.7%"},
{title:"Fisher Equation",formula:"i = i\u1d63 + \u03c0\u1d49",explain:"Nominal rate = real rate + expected inflation. The real rate drives borrowing/lending decisions. When real rates are low, borrowing is cheap in purchasing-power terms.",example:"Nominal rate 8%, expected inflation 3% \u2192 real rate = 5%"},
],
week5:[
{title:"Bond Price\u2013Yield Relationship (Discount)",formula:"i = (F \u2212 P) / P  \u21d4  P = F / (1 + i)",explain:"Price and yield are always inversely related. A rise in P means a fall in i, and vice versa. This is why we can analyze the bond market using either price or interest rate on the vertical axis.",example:"If F = $1,000 and i = 25%: P = 1000/1.25 = $800. If P = $950: i = (1000\u2212950)/950 = 5.26%"},
{title:"Consol/Perpetuity Yield",formula:"i\u1d9c = C / P\u1d9c  \u21d4  P\u1d9c = C / i\u1d9c",explain:"For a perpetual bond (no maturity), the yield equals the annual coupon divided by the price. This is the simplest price-yield inverse relationship and shows clearly how P and i move in opposite directions.",example:"Coupon = $100, Price = $2,000: i\u1d9c = 100/2000 = 5%. If price drops to $1,000: i\u1d9c = 100/1000 = 10%"},
{title:"Equilibrium in Bond Market",formula:"B\u1d48 = B\u02e2 \u2192 P* and i*",explain:"The equilibrium (market clearing) price and interest rate are determined where the quantity of bonds demanded equals the quantity supplied. Excess demand \u2192 P\u2191, i\u2193. Excess supply \u2192 P\u2193, i\u2191.",example:"At P=$850 (i=17.6%), B\u1d48=B\u02e2=$300B \u2192 equilibrium"},
{title:"Liquidity Preference (Walras\u2019 Law)",formula:"B\u02e2 + M\u02e2 = B\u1d48 + M\u1d48\n\u21d2 B\u02e2 \u2212 B\u1d48 = M\u1d48 \u2212 M\u02e2",explain:"If the money market clears (M\u02e2=M\u1d48), the bond market must also clear (B\u02e2=B\u1d48). So we can analyze interest rate determination using EITHER the bond market OR the money market \u2014 they give the same answer.",example:"Money market equilibrium at i*=15% with M\u02e2=$300B automatically implies bond market equilibrium."},
{title:"Money Demand Function",formula:"M\u1d48 = L(Y, i)\n\u2202L/\u2202Y > 0  (income: more transactions)\n\u2202L/\u2202i < 0  (opportunity cost of holding money)",explain:"Money demand depends positively on income (more transactions) and negatively on the interest rate (higher opportunity cost). This gives the downward-sloping Md curve in the liquidity preference diagram.",example:"If Y rises from $18T to $20T, Md shifts RIGHT at every interest rate. If i rises from 3% to 5%, people hold less money (movement along the curve, not a shift)."},
{title:"Fisher Effect (Bond Market Derivation)",formula:"\u03c0\u1d49\u2191 \u2192 B\u1d48 shifts LEFT + B\u02e2 shifts RIGHT \u2192 P\u2193 \u2192 i\u2191\nResult: \u0394i \u2248 \u0394\u03c0\u1d49 (Fisher equation: i = r + \u03c0\u1d49)",explain:"The Fisher Effect derived from bond S&D: expected inflation lowers demand (lower real return) AND raises supply (cheaper to repay). Both shifts reinforce higher interest rates. This is the most important application of Ch. 5 analysis.",example:"\u03c0\u1d49 rises from 2% to 5%: both curves shift \u2192 i rises by approximately 3% (from, say, 5% to 8%)."},
{title:"Effects of Money Supply on Interest Rates",formula:"Four effects: Liquidity (\u2193i), Income (\u2191i), Price-level (\u2191i), Expected-inflation (\u2191i)",explain:"An increase in money supply has OPPOSING effects on interest rates. The immediate liquidity effect lowers rates, but income, price-level, and expected-inflation effects raise rates over time. The net effect depends on which dominates.",example:"M\u2191 \u2192 immediate i\u2193 (liquidity), then Y\u2191 \u2192 i\u2191 (income), then P\u2191 \u2192 i\u2191 (price-level). Long-run: if \u03c0\u1d49 effect dominates, rates END UP HIGHER."},
{title:"Bond Demand Shift Factors",formula:"B\u1d48 shifts RIGHT if:\nWealth\u2191, Expected return\u2191, Risk\u2193, Liquidity\u2191\nB\u1d48 shifts LEFT if:\nExpected i(future)\u2191, \u03c0\u1d49\u2191, Risk\u2191, Liquidity\u2193",explain:"These are the \u201cshift factors\u201d for the bond demand curve from Summary Table 2 in Mishkin. Movement ALONG the curve happens when the bond\u2019s own price changes. A SHIFT happens when these external factors change.",example:"Economy enters recession: Wealth\u2193 \u2192 B\u1d48 shifts LEFT. But risk of stocks\u2191 \u2192 bonds relatively safer \u2192 B\u1d48 shifts RIGHT (flight to quality). Net effect depends on magnitudes."},
{title:"Bond Supply Shift Factors",formula:"B\u02e2 shifts RIGHT if:\nProfitability of investment\u2191\nExpected inflation\u2191\nGovernment deficit\u2191",explain:"From Summary Table 3 in Mishkin. These are the factors that cause borrowers to issue MORE bonds at every price level. All three shift supply RIGHT \u2192 P\u2193 \u2192 i\u2191.",example:"Government runs a $2T deficit: must issue $2T in new bonds \u2192 B\u02e2 shifts massively RIGHT \u2192 P\u2193 \u2192 i\u2191 (crowding out private investment)."},
],
week6:[
{title:"Risk Premium",formula:"Risk premium = i(corporate) \u2212 i(Treasury) for same maturity",explain:"The spread between a risky bond\u2019s yield and the default-free Treasury yield. Increases with default probability. Widens during financial crises (flight to quality).",example:"Baa corporate at 6.5%, 10yr Treasury at 3.5% \u2192 risk premium = 3.0% (300 bps)"},
{title:"Expectations Theory (n-period rate)",formula:"i\u2099\u209c = (i\u209c + i\u1d49\u209c\u208a\u2081 + i\u1d49\u209c\u208a\u2082 + ... + i\u1d49\u209c\u208a\u208d\u2099\u208b\u2081\u208e) / n",explain:"The long-term rate is the arithmetic average of current and expected future short-term rates. Assumes bonds of different maturities are PERFECT substitutes. Explains co-movement (fact 1) and slope patterns (fact 2), but NOT usual upward slope (fact 3).",example:"i\u209c=5%, i\u1d49\u209c\u208a\u2081=6%, i\u1d49\u209c\u208a\u2082=7%, i\u1d49\u209c\u208a\u2083=8%, i\u1d49\u209c\u208a\u2084=9% \u2192 i\u2085\u209c = (5+6+7+8+9)/5 = 7%"},
{title:"Liquidity Premium Theory",formula:"i\u2099\u209c = (i\u209c + i\u1d49\u209c\u208a\u2081 + ... + i\u1d49\u209c\u208a\u208d\u2099\u208b\u2081\u208e) / n + l\u2099\u209c",explain:"Same as expectations theory PLUS a liquidity premium l\u2099\u209c that is always positive and increases with maturity n. Investors require extra compensation for holding longer-term bonds due to interest-rate risk. Explains ALL three facts.",example:"Using same rates: i\u2085\u209c = 7% + 0.5% (liquidity premium) = 7.5%"},
{title:"Tax Equivalent Yield",formula:"Tax-equivalent yield = muni yield / (1 \u2212 tax rate)",explain:"To compare a tax-exempt municipal bond with a taxable bond, convert the muni yield to what a taxable bond would need to yield to give the same after-tax return.",example:"Muni yield 4%, tax rate 39.6%: equivalent = 4%/(1\u22120.396) = 6.62%. You\u2019d need a 6.62% taxable bond to match."},
],
week7:[
{title:"One-Period Stock Valuation",formula:"P\u2080 = Div\u2081/(1+k\u2091) + P\u2081/(1+k\u2091)",explain:"The stock price today equals the present value of next year\u2019s dividend plus the present value of the expected sale price. k\u2091 is the required return on equity. This is the starting point for all stock valuation models.",example:"Div\u2081=$2, P\u2081=$52, k\u2091=10%: P\u2080 = 2/1.10 + 52/1.10 = 1.82 + 47.27 = $49.09"},
{title:"Generalized Dividend Valuation",formula:"P\u2080 = \u03a3 D\u209c/(1+k\u2091)\u1d57  for t = 1 to \u221e",explain:"Stock price = present value of ALL future dividends. As holding period extends to infinity, the terminal sale price is discounted to zero, leaving only dividends. This proves that even growth stocks are ultimately valued on dividends.",example:"If D\u209c grows at different rates each year, discount each dividend individually and sum them all."},
{title:"Gordon Growth Model",formula:"P\u2080 = D\u2080(1+g) / (k\u2091 \u2212 g) = D\u2081 / (k\u2091 \u2212 g)",explain:"Assumes constant dividend growth rate g forever, with k\u2091 > g. Three drivers of stock price: D\u2081 (higher dividends \u2192 higher price), k\u2091 (higher risk \u2192 lower price), g (faster growth \u2192 higher price). The most important stock valuation formula.",example:"D\u2080=$3, g=4%, k\u2091=12%: P\u2080 = 3(1.04)/(0.12\u22120.04) = 3.12/0.08 = $39.00"},
{title:"Rate of Return on a Security",formula:"R = (P\u209c\u208a\u2081 \u2212 P\u209c + C) / P\u209c",explain:"Total return = capital gain + cash payment (dividend or coupon), divided by initial price. In the EMH framework, the expected return R\u1d49 equals R\u1d52\u1da0 (optimal forecast), and in equilibrium R\u1d52\u1da0 = R* (equilibrium return).",example:"Buy at P\u209c=$50, sell at P\u209c\u208a\u2081=$53, dividend C=$2: R = (53\u221250+2)/50 = 10%"},
{title:"Efficient Market Condition",formula:"R\u1d52\u1da0 = R*",explain:"The optimal forecast of a security\u2019s return equals the equilibrium return. If R\u1d52\u1da0 > R*, buying pressure pushes P\u209c up until R\u1d52\u1da0 falls to R*. If R\u1d52\u1da0 < R*, selling pressure pushes P\u209c down until R\u1d52\u1da0 rises to R*. This is the core condition of the Efficient Market Hypothesis.",example:"If the equilibrium return for a stock\u2019s risk class is 10%, and the optimal forecast gives 15%, investors buy \u2192 price rises \u2192 expected return falls to 10%."},
],
};

function renderWeekQuiz(wk){
var qs=WEEK_QUIZZES[wk]||[];
var el=document.getElementById('wk-quiz-panel');
if(!qs.length){el.innerHTML='<div class="wk-coming">No quiz questions for this week yet.</div>';return}
var h='<div class="qz-intro">\ud83c\udfaf <b>Essay Practice</b><br>These questions test Mishkin\u2019s monetary economics concepts: definitions, mechanisms, and real-world application. Click "Show Model Answer" to reveal the step-by-step response framework.</div>';
qs.forEach(function(q,i){
var typeLabels={concept:"Concept",scenario:"Real-World Scenario",policy:"Policy Analysis",diagram:"Diagram-Based",quant:"Quantitative"};
h+='<div class="qz-q">';
h+='<div class="qz-q-head">';
h+='<span class="qz-q-num">'+(i+1)+'</span>';

h+='</div></div>';
h+='<button class="qz-reveal-btn" onclick="this.nextElementSibling.classList.toggle(\'open\');this.textContent=this.nextElementSibling.classList.contains(\'open\')?\'Hide Model Answer \u25b2\':\'Show Model Answer \u25bc\'">Show Model Answer \u25bc</button>';
h+='<div class="qz-answer">';

q.answer.forEach(function(s){h+='<div class="qz-step">'+s+'</div>';});
if(q.chain) h+='<div class="qz-chain">\ud83d\udcd0 Transmission Chain:<br>'+q.chain+'</div>';

h+='</div></div>';
});
el.innerHTML=h;
}
const GLOSSARY=[
{market:"Money & Functions",color:"#FFFBEB",border:"#D97706",text:"#92400E",terms:[
["Money","Anything generally accepted as payment for goods/services or repayment of debts. Stock concept. \u2260 Wealth \u2260 Income."],
["Medium of Exchange","Primary function. Eliminates double coincidence of wants. Must be standardized, accepted, divisible, portable, durable."],
["Unit of Account","Common measure for pricing. Reduces N(N-1)/2 prices to N-1. Breaks down in hyperinflation."],
["Store of Value","Saves purchasing power over time. Most liquid but eroded by inflation. Opportunity cost = interest rate."],
["M1","Currency + Demand deposits + Other checkable. ~$3.56T (2017). Most liquid aggregate."],
["M2","M1 + Small time + Savings/MMDA + MMMF. ~$13.5T. Better predictor of economic activity."],
["Currency","Physical money. ~$1.48T. Over half held outside the US. ~$4,500 per capita."],
["Liquidity","Ease of converting to cash without loss. Cash = perfectly liquid. Real estate = illiquid."],
["Fiat Money","Paper money decreed as legal tender. Not backed by commodity."],
["Commodity Money","Money made of valuable commodities (gold, silver). Has intrinsic value."],
["E-Money","Electronic money: debit cards, stored-value cards, e-cash."],
["Velocity","V = PY/M. Speed money circulates. If stable, quantity theory holds."],
]},
{market:"Financial Markets",color:"#EFF6FF",border:"#2563EB",text:"#1E40AF",terms:[
["Financial Markets","Markets channeling funds from surplus to deficit units. Enable efficient capital allocation."],
["Bond","Debt security with periodic payments. Price inversely related to yield."],
["Interest Rate","Cost of borrowing. Most important financial variable. Determined by supply-demand for funds."],
["Security","Claim on issuer\u2019s future income or assets. Debt (bonds) or equity (stocks)."],
["Common Stock","Share of corporate ownership. Claim on residual earnings. Price = PDV of dividends."],
["Direct Finance","Borrowers sell securities directly to lenders in financial markets."],
["Indirect Finance","Funds flow through intermediaries. Dominates because intermediaries solve TC, risk, info problems."],
["Primary Market","Where NEW securities are issued. Investment banks underwrite."],
["Secondary Market","Where previously issued securities trade. Provides liquidity and price discovery."],
["Money Market","Short-term debt (<1 year). T-bills, CDs, commercial paper, repos. Low risk."],
["Capital Market","Long-term debt/equity (>1 year). Stocks, bonds, mortgages. Higher risk."],
["T-bills","Most liquid money market instrument. Sold at discount. Zero default risk."],
["Repos","Repurchase agreements. Short-term secured lending using T-bills as collateral."],
["Fed Funds","Overnight interbank loans of reserves. Fed funds rate = key policy rate."],
]},
{market:"Financial Institutions",color:"#ECFDF5",border:"#059669",text:"#065F46",terms:[
["Financial Intermediaries","Borrow from savers, lend to borrowers. Banks, insurance, pensions, mutual funds."],
["Commercial Banks","Accept deposits, make loans. Most important intermediaries. Create money through lending."],
["Transaction Costs","Time and money in financial transactions. Intermediaries reduce via economies of scale."],
["Risk Sharing","Intermediaries diversify, reducing risk for each depositor. Asset transformation."],
["Adverse Selection","BEFORE-transaction info problem. Bad risks most eager to borrow. Solution: screening."],
["Moral Hazard","AFTER-transaction info problem. Borrower may take excess risk. Solution: monitoring, covenants."],
["Deposit Insurance","FDIC: $250K per depositor per bank. Prevents runs but creates moral hazard."],
]},
{market:"Central Banking & Policy",color:"#F5F3FF",border:"#7C3AED",text:"#5B21B6",terms:[
["Central Bank","Manages monetary policy. Fed in US. Dual mandate: max employment + stable prices."],
["Monetary Policy","Management of money supply and interest rates. Expansionary or contractionary."],
["Fiscal Policy","Government spending and taxation. Deficit = G > T. Surplus = T > G."],
["Quantity Theory","MV = PY. Excess money growth \u2192 proportional price increase (long run)."],
["Fisher Equation","i = r + \u03c0\u1d49. Nominal rate = real rate + expected inflation."],
]},
{market:"Macro Linkages",color:"#FDF2F8",border:"#DB2777",text:"#9D174D",terms:[
["GDP","Market value of all final goods/services produced in a year. Three approaches: production, income, expenditure."],
["Inflation","Sustained rise in price level. \u03c0 = \u0394P/P. Erodes money\u2019s store of value function."],
["Business Cycles","Expansions and recessions. Money growth declines precede recessions."],
["Exchange Rate","Price of one currency in another. E\u2191 = depreciation. Affected by interest differentials."],
["CPI","Consumer Price Index. Most widely reported inflation measure."],
["GDP Deflator","(Nominal GDP / Real GDP) \u00d7 100. Broadest price measure."],
]},
{market:"Interest Rates (Ch. 4)",color:"#FEF2F2",border:"#DC2626",text:"#991B1B",terms:[
["Present Value","PV = CF/(1+i)\u207f. Today\u2019s value of a future payment. Foundation of all asset pricing."],
["Yield to Maturity","Interest rate that equates PV of all cash flows with instrument\u2019s current value. Most accurate interest rate measure."],
["Simple Loan","Lender provides funds; borrower repays principal + interest at maturity. YTM = simple interest rate."],
["Fixed-Payment Loan","Same cash flow every period (e.g., mortgage). YTM found by solving annuity PV equation."],
["Coupon Bond","Periodic coupon payments + face value at maturity. P and YTM are inversely related. When P=F, YTM=coupon rate."],
["Discount Bond","Bought below face value, no coupons. YTM = (F\u2212P)/P for one-year. E.g., T-bills."],
["Coupon Rate","Annual coupon / face value. Fixed at issuance. \u2260 YTM unless bond trades at par."],
["Current Yield","C/P. Easy approximation of YTM. Equals YTM for consols/perpetuities."],
["Consol (Perpetuity)","Bond with no maturity, pays fixed coupon forever. P = C/i. Yield: i = C/P."],
["Rate of Return","RET = current yield + capital gain = C/P + (P\u209c\u208a\u2081\u2212P\u209c)/P\u209c. Equals YTM only if held to maturity."],
["Interest-Rate Risk","Prices/returns of long-term bonds more volatile than short-term. Zero risk if maturity = holding period."],
["Nominal Interest Rate","Stated rate, no inflation adjustment. What you see quoted."],
["Real Interest Rate","i\u1d63 = i \u2212 \u03c0\u1d49. Adjusted for expected inflation. Better indicator of borrowing/lending incentives."],
["Ex Ante Real Rate","Uses expected inflation. Relevant for decisions."],
["Ex Post Real Rate","Uses actual inflation. For historical analysis."],
]},
{market:"Interest Rate Behavior (Ch. 5)",color:"#EFF6FF",border:"#2563EB",text:"#1E40AF",terms:[
["Theory of Portfolio Choice","Demand for assets depends on: wealth (+), expected return (+), risk (\u2212), liquidity (+). All relative to alternatives."],
["Bond Demand Curve","Downward-sloping in price (upward in yield). Shifts with wealth, expected returns, expected inflation, risk, liquidity."],
["Bond Supply Curve","Upward-sloping in price. Shifts with investment profitability, expected inflation, government deficits."],
["Loanable Funds Framework","Bond market S&D determines equilibrium interest rate. B\u1d48=B\u02e2 at equilibrium price/rate."],
["Liquidity Preference Framework","Keynes: money market S&D determines interest rate. M\u1d48=M\u02e2 at equilibrium. Equivalent to bond market by Walras\u2019 Law."],
["Liquidity Effect","M\u02e2\u2191 \u2192 i\u2193 immediately. Excess money supply \u2192 buy bonds \u2192 P\u2191 \u2192 i\u2193."],
["Income Effect","M\u02e2\u2191 \u2192 Y\u2191 \u2192 M\u1d48\u2191 \u2192 i\u2191. Expansionary money raises income, increasing money demand."],
["Price-Level Effect","M\u02e2\u2191 \u2192 P\u2191 \u2192 M\u1d48\u2191 \u2192 i\u2191. Permanent effect even after prices stop rising."],
["Expected-Inflation Effect","M\u02e2\u2191 \u2192 \u03c0\u1d49\u2191 \u2192 i\u2191 (Fisher). Persists only while price level continues rising."],
["Fisher Effect","\u03c0\u1d49\u2191 shifts bond demand LEFT + supply RIGHT \u2192 P\u2193 \u2192 i\u2191. Nominal rates track expected inflation."],
]},
{market:"Risk & Term Structure (Ch. 6)",color:"#ECFDF5",border:"#059669",text:"#065F46",terms:[
["Risk Structure","Why same-maturity bonds have different rates: default risk, liquidity, tax considerations."],
["Default Risk","Probability issuer can\u2019t pay. Higher risk \u2192 higher yield. Treasuries = default-free benchmark."],
["Risk Premium","Spread between risky bond yield and same-maturity Treasury yield. Widens in crises (flight to quality)."],
["Credit Rating","Moody\u2019s/S&P/Fitch assessment. Investment grade: Baa3/BBB\u2212 and above. Below = speculative/junk."],
["Flight to Quality","Crisis \u2192 sell risky bonds, buy Treasuries \u2192 spread widens. Happened dramatically in 2007\u20132009."],
["Municipal Bond","Tax-exempt interest \u2192 can yield LESS than Treasuries despite higher default risk."],
["Term Structure","Relationship between interest rates and maturity for otherwise identical bonds. Shown by yield curve."],
["Yield Curve","Plot of yields vs maturity. Upward-sloping (normal), flat, or inverted (recession signal)."],
["Expectations Theory","Long rate = average of expected short rates. Perfect substitutes. Explains facts 1&2, not 3."],
["Segmented Markets Theory","Different maturities are NOT substitutes. Own S&D per maturity. Explains fact 3 only."],
["Liquidity Premium Theory","Long rate = avg expected short rates + liquidity premium (l\u2099\u209c > 0, rising with n). Explains all 3 facts."],
["Preferred Habitat Theory","Investors prefer specific maturities but will switch for higher expected returns. Similar result to liquidity premium."],
["Inverted Yield Curve","Long rates < short rates. Signals expected sharp rate cuts \u2192 famous recession predictor."],
]},
{market:"Stock Market & EMH (Ch. 7)",color:"#FDF2F8",border:"#DB2777",text:"#9D174D",terms:[
["One-Period Valuation","P\u2080 = Div\u2081/(1+k\u2091) + P\u2081/(1+k\u2091). Stock price = PV of next dividend + PV of expected sale price."],
["Generalized Dividend Model","P\u2080 = \u03a3 D\u209c/(1+k\u2091)\u1d57. Stock value = PV of all future dividends. Terminal price negligible if far enough out."],
["Gordon Growth Model","P\u2080 = D\u2081/(k\u2091\u2212g). Constant dividend growth forever. k\u2091 > g required. Key stock valuation formula."],
["Required Return (k\u2091)","The return investors demand for holding equity, reflecting opportunity cost and risk. Higher k\u2091 \u2192 lower stock price."],
["Dividend Growth Rate (g)","Expected constant growth rate of dividends. Higher g \u2192 higher stock price (faster cash flow growth)."],
["Market Fundamentals","Items with direct impact on future income streams of securities. Some argue prices always reflect these."],
["Adaptive Expectations","Expectations formed from past data only. Adjust slowly. Limitation: ignores current information."],
["Rational Expectations","X\u1d49 = X\u1d52\u1da0. Expectations equal optimal forecast using ALL available information. Errors are random, not systematic."],
["Optimal Forecast","The best prediction possible given all available information. May still be inaccurate due to unknowns."],
["Efficient Market Hypothesis","R\u1d52\u1da0 = R*. Security prices fully reflect all available information. No unexploited profit opportunities."],
["Unexploited Profit Opportunity","When R\u1d52\u1da0 \u2260 R*. Buying/selling pressure eliminates these quickly in efficient markets."],
["Random Walk","Stock prices follow unpredictable path. Future changes cannot be forecast from past changes."],
["Behavioral Finance","Uses psychology (loss aversion, overconfidence, social contagion) to explain market anomalies and deviations from EMH."],
["Loss Aversion","People feel losses more than equivalent gains. Explains reluctance to short sell \u2192 overpriced stocks persist."],
["Overconfidence","Investors overestimate their information precision. Explains excessive trading volume in markets."],
["Social Contagion","Investor enthusiasm spreads virally. Combined with overconfidence, helps explain bubbles."],
]},
];
function renderGlossary(){
const el=document.getElementById('glossary-view');
let totalTerms=GLOSSARY.reduce((a,g)=>a+g.terms.length,0);
let h=`<div class="glo-title">\ud83d\udcd6 Exam Glossary</div>
<div class="glo-sub">${totalTerms} terms across ${GLOSSARY.length} categories \u2014 Monetary Economics (Mishkin) Weeks 1\u20137.</div>
<input type="text" class="glo-search" id="glo-q" placeholder="Search any term..." oninput="filterGlossary()">`;
GLOSSARY.forEach((g,gi)=>{
h+=`<div class="glo-market" id="glo-m-${gi}">
<div class="glo-market-head" style="background:${g.color};color:${g.text};border-bottom:1px solid ${g.border}30" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
<span>${g.market}</span><span class="glo-count">${g.terms.length} terms</span></div>
<div class="glo-market-body">`;
g.terms.forEach(([name,def])=>{
h+=`<div class="glo-term"><span class="glo-term-name">${name}</span><span class="glo-term-def">${def}</span></div>`;
});
h+=`</div></div>`;
});
el.innerHTML=h;
}
function filterGlossary(){
const q=document.getElementById('glo-q').value.toLowerCase().trim();
document.querySelectorAll('.glo-term').forEach(t=>{
const name=t.querySelector('.glo-term-name').textContent.toLowerCase();
const def=t.querySelector('.glo-term-def').textContent.toLowerCase();
t.style.display=(name.includes(q)||def.includes(q))?'':'none';
});
if(q){document.querySelectorAll('.glo-market-body').forEach(b=>b.style.display='')}
}
</script>
